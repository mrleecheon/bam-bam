<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>뱀뱀이 (BAMBAMI) · 말랑말랑한 하루</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&family=Nanum+Pen+Script&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" rel="stylesheet">
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    :root {
      /* ─── 파스텔 그린 팔레트 ─── */
      --mint-50:  #f3fbf6;
      --mint-100: #e6f7ec;
      --mint-200: #d6f0e0;   /* 캐릭터 톤 핵심 */
      --mint-300: #b9e6cb;
      --mint-400: #92d4af;
      --mint-500: #6dbf94;
      --cream:    #fefcf7;
      --milk:     #fbf8f1;
      --ink:      #2f4a3a;   /* 진한 민트 잉크 */
      --ink-soft: #4a6b58;
      --ink-mute: #8aa697;
      --pink-blush: #f7c8d2;
      --pink-bg:    #fceaef;
      --shadow-soft:  0 8px 24px rgba(60, 110, 84, 0.10), 0 2px 6px rgba(60, 110, 84, 0.06);
      --shadow-puff:  0 14px 30px rgba(76, 130, 100, 0.14), inset -3px -4px 10px rgba(76, 130, 100, 0.08), inset 3px 4px 10px rgba(255, 255, 255, 0.7);
      --shadow-press: 0 2px 6px rgba(60, 110, 84, 0.18), inset 2px 3px 8px rgba(76, 130, 100, 0.18), inset -1px -2px 6px rgba(255, 255, 255, 0.5);
      --gradient-bg: linear-gradient(180deg, #ffffff 0%, #f3fbf6 35%, #e6f7ec 100%);
    }
    * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }
    html, body {
      margin: 0; padding: 0;
      background:
        radial-gradient(ellipse at 15% 0%, rgba(217, 240, 226, 0.6) 0%, transparent 55%),
        radial-gradient(ellipse at 85% 100%, rgba(252, 234, 239, 0.45) 0%, transparent 55%),
        linear-gradient(165deg, #fbfdfb 0%, #f0f8f3 45%, #e6f3ec 100%);
      background-attachment: fixed;
      min-height: 100vh;
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
      color: var(--ink);
    }
    /* 잔잔한 노이즈/도트 + 떠다니는 파스텔 빛망울 */
    body::before {
      content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background-image:
        radial-gradient(circle at 22% 28%, rgba(146, 212, 175, 0.15) 0, transparent 35%),
        radial-gradient(circle at 78% 72%, rgba(247, 200, 210, 0.10) 0, transparent 35%),
        radial-gradient(circle at 50% 5%, rgba(217, 240, 226, 0.18) 0, transparent 40%);
    }
    body::after {
      content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background-image:
        radial-gradient(circle at 1px 1px, rgba(76, 130, 100, 0.04) 1px, transparent 0);
      background-size: 24px 24px;
      opacity: 0.6;
    }
    #root { position: relative; z-index: 1; }
    button { font-family: inherit; }

    /* ───────────────────────────────────────────────────────────
       애니메이션
    ─────────────────────────────────────────────────────────── */
    @keyframes float {
      0%, 100% { transform: translateY(0) rotate(-1deg); }
      50%      { transform: translateY(-7px) rotate(1deg); }
    }
    @keyframes floatIntro {
      0%, 100% { transform: translateY(0) rotate(-1deg); }
      50%      { transform: translateY(-9px) rotate(1deg); }
    }
    @keyframes arriving {
      0%   { transform: translateX(80px) translateY(20px) scale(0.7); opacity: 0; }
      100% { transform: translateX(0) translateY(0) scale(1);          opacity: 1; }
    }
    @keyframes bubblePop {
      0%   { transform: scale(0.7) translateY(8px); opacity: 0; }
      55%  { transform: scale(1.04);                opacity: 1; }
      100% { transform: scale(1) translateY(0);     opacity: 1; }
    }
    @keyframes thinkingDots {
      0%, 20%   { opacity: 0.2; transform: translateY(0); }
      50%       { opacity: 1;   transform: translateY(-2px); }
      80%, 100% { opacity: 0.2; transform: translateY(0); }
    }
    @keyframes heartFloat {
      0%   { transform: translateY(0) scale(1);     opacity: 1; }
      100% { transform: translateY(-60px) scale(1.5); opacity: 0; }
    }
    @keyframes streakPop {
      0%   { transform: scale(0.7); opacity: 0; }
      60%  { transform: scale(1.1); opacity: 1; }
      100% { transform: scale(1);   opacity: 1; }
    }
    @keyframes twinkle {
      0%, 100% { opacity: 0.3; }
      50%      { opacity: 0.95; }
    }
    @keyframes nickFade {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes petBounce {
      0%, 100% { transform: translateY(0) scale(1); }
      30%      { transform: translateY(-12px) scale(1.04); }
      60%      { transform: translateY(2px) scale(0.97); }
    }
    @keyframes shadowPulse {
      0%, 100% { transform: scaleX(1) translateX(-50%); opacity: 0.18; }
      50%      { transform: scaleX(0.9) translateX(-55%); opacity: 0.12; }
    }

    /* ───────────────────────────────────────────────────────────
       메인 셸
    ─────────────────────────────────────────────────────────── */
    .main-shell {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 28px 18px;
      position: relative;
    }

    /* 디바이스 프레임 — 폭신폭신 에폭시 */
    .device-frame {
      width: 380px;
      max-width: 100%;
      background:
        linear-gradient(160deg, rgba(255,255,255,0.85) 0%, rgba(230,247,236,0.7) 100%);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.9);
      border-radius: 38px;
      padding: 22px 20px 26px;
      position: relative;
      box-shadow:
        0 28px 60px -20px rgba(60, 110, 84, 0.28),
        0 16px 32px -16px rgba(60, 110, 84, 0.18),
        inset 0 1px 0 rgba(255, 255, 255, 0.95),
        inset 0 -2px 0 rgba(146, 212, 175, 0.12);
    }
    .device-frame::before {
      content: ''; position: absolute;
      top: 10px; left: 50%; transform: translateX(-50%);
      width: 50px; height: 5px;
      background: linear-gradient(180deg, rgba(146,212,175,0.5), rgba(146,212,175,0.25));
      border-radius: 4px;
      box-shadow: inset 0 1px 1px rgba(255,255,255,0.6);
    }

    /* 상단 정보 바 */
    .info-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 4px 14px;
    }
    .streak-badge {
      display: flex; align-items: center; gap: 4px;
      font-size: 12px; font-weight: 600;
      color: var(--ink-soft);
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(8px);
      padding: 4px 10px;
      border-radius: 20px;
      box-shadow:
        0 2px 6px rgba(60, 110, 84, 0.06),
        inset 0 1px 0 rgba(255, 255, 255, 0.9);
      animation: streakPop 0.45s ease;
    }
    .weather-chip {
      font-size: 14px;
      width: 28px; height: 28px;
      display: flex; align-items: center; justify-content: center;
      background: rgba(255, 255, 255, 0.7);
      border-radius: 50%;
      box-shadow:
        0 2px 6px rgba(60, 110, 84, 0.06),
        inset 0 1px 0 rgba(255, 255, 255, 0.9);
    }

    /* 화면 영역 */
    .screen {
      border: 1px solid rgba(255, 255, 255, 0.6);
      border-radius: 26px;
      padding: 0;
      position: relative;
      overflow: hidden;
      transition: background 1.5s ease;
      height: 440px;
      display: flex;
      flex-direction: column;
      box-shadow:
        inset 2px 3px 8px rgba(76, 130, 100, 0.10),
        inset -2px -3px 8px rgba(255, 255, 255, 0.8),
        0 4px 12px rgba(60, 110, 84, 0.08);
    }

    .clock-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 9px 14px;
      background: rgba(255, 255, 255, 0.45);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.6);
      font-family: 'Pretendard', sans-serif;
      font-weight: 500;
      color: var(--ink-soft);
      font-size: 12px;
      z-index: 3;
      flex-shrink: 0;
    }
    .clock-bar .brand-name { font-weight: 600; color: var(--ink); letter-spacing: 0.5px; }
    .clock-bar .clock-time { font-variant-numeric: tabular-nums; font-weight: 600; color: var(--ink); font-size: 13px; }
    .clock-bar .clock-mood { opacity: 0.7; font-size: 11px; }

    .stage {
      flex: 1;
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      padding-bottom: 16px;
    }

    /* 말풍선 영역 */
    .message-area {
      position: absolute;
      top: 12px; left: 14px; right: 14px;
      z-index: 2;
      display: flex;
      flex-direction: column;
      gap: 7px;
      pointer-events: none;
    }
    .bubble-row { display: flex; width: 100%; }
    .bubble-row.left  { justify-content: flex-start; }
    .bubble-row.right { justify-content: flex-end; }

    .speech-bubble {
      background: rgba(255, 255, 255, 0.88);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.9);
      color: var(--ink);
      padding: 10px 16px;
      border-radius: 22px;
      font-family: 'Pretendard', sans-serif;
      font-weight: 500;
      font-size: 14px;
      line-height: 1.45;
      max-width: 80%;
      word-break: keep-all;
      overflow-wrap: break-word;
      position: relative;
      box-shadow:
        0 6px 16px rgba(60, 110, 84, 0.10),
        0 1px 3px rgba(60, 110, 84, 0.06),
        inset 0 1px 0 rgba(255, 255, 255, 0.95);
      animation: bubblePop 0.45s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }
    .speech-bubble.bambami { border-bottom-left-radius: 8px; }
    .speech-bubble.user {
      background: linear-gradient(160deg, var(--mint-300), var(--mint-400));
      color: var(--ink);
      border: 1px solid rgba(255, 255, 255, 0.5);
      border-bottom-right-radius: 8px;
      box-shadow:
        0 6px 16px rgba(109, 191, 148, 0.28),
        inset 0 1px 0 rgba(255, 255, 255, 0.5);
    }
    .thinking-bubble {
      display: flex; gap: 5px;
      padding: 13px 18px;
      align-items: center;
    }
    .thinking-bubble span {
      width: 6px; height: 6px;
      background: var(--mint-500);
      border-radius: 50%;
      animation: thinkingDots 1.4s ease-in-out infinite;
    }
    .thinking-bubble span:nth-child(2) { animation-delay: 0.2s; }
    .thinking-bubble span:nth-child(3) { animation-delay: 0.4s; }

    /* ───────────────────────────────────────────────────────────
       뱀뱀이 캐릭터
    ─────────────────────────────────────────────────────────── */
    .character-float {
      animation: float 4s ease-in-out infinite;
      z-index: 1;
      position: relative;
    }
    .character-float.pet-bounce {
      animation: petBounce 0.42s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .bambami-wrap {
      position: relative;
      display: inline-block;
      cursor: pointer;
      user-select: none;
      -webkit-user-select: none;
      -webkit-tap-highlight-color: transparent;
      transition: filter 0.3s ease;
    }
    .bambami-wrap:hover { filter: brightness(1.04); }
    .bambami-wrap:active { transform: scale(0.97); }
    .bambami-wrap.petting { filter: brightness(1.06) saturate(1.1); }

    .bambami-img {
      display: block;
      width: 200px;
      height: auto;
      pointer-events: none;
      filter:
        drop-shadow(0 8px 14px rgba(76, 130, 100, 0.22))
        drop-shadow(0 2px 4px rgba(76, 130, 100, 0.12));
      transition: opacity 0.35s ease, transform 0.35s ease;
    }
    .bambami-img.intro { width: 220px; }

    .bambami-shadow {
      position: absolute;
      bottom: -2px;
      left: 50%;
      transform: translateX(-50%);
      width: 130px;
      height: 14px;
      background: radial-gradient(ellipse, rgba(76, 130, 100, 0.22) 0%, transparent 70%);
      border-radius: 50%;
      animation: shadowPulse 4s ease-in-out infinite;
      pointer-events: none;
      z-index: -1;
    }

    .sleepy-z {
      position: absolute;
      top: 8px; right: -2px;
      color: var(--ink-soft);
      font-family: serif;
      font-style: italic;
      font-weight: 500;
    }

    /* ───────────────────────────────────────────────────────────
       컨트롤 (버튼)
    ─────────────────────────────────────────────────────────── */
    .controls { margin-top: 16px; padding: 0 4px; }
    .button-row { display: flex; gap: 10px; }
    .chat-input-area { display: flex; gap: 8px; align-items: stretch; }

    /* 폭신한 에폭시 버튼 (Soft UI) */
    .puff-btn {
      font-family: 'Pretendard', sans-serif;
      font-weight: 600;
      font-size: 15px;
      letter-spacing: 0.3px;
      padding: 12px 18px;
      cursor: pointer;
      border-radius: 18px;
      transition: all 0.18s cubic-bezier(0.4, 0, 0.2, 1);
      border: 1px solid rgba(255, 255, 255, 0.7);
      background: linear-gradient(180deg, #ffffff 0%, var(--mint-50) 100%);
      color: var(--ink);
      box-shadow:
        0 6px 14px rgba(60, 110, 84, 0.10),
        0 2px 4px rgba(60, 110, 84, 0.06),
        inset 0 1px 0 rgba(255, 255, 255, 0.95),
        inset 0 -2px 0 rgba(146, 212, 175, 0.12);
    }
    .puff-btn:hover {
      transform: translateY(-1px);
      box-shadow:
        0 10px 20px rgba(60, 110, 84, 0.14),
        0 3px 6px rgba(60, 110, 84, 0.08),
        inset 0 1px 0 rgba(255, 255, 255, 0.95);
    }
    .puff-btn:active, .puff-btn.pressed {
      transform: translateY(1px) scale(0.98);
      box-shadow:
        0 2px 4px rgba(60, 110, 84, 0.08),
        inset 2px 3px 8px rgba(76, 130, 100, 0.18),
        inset -1px -2px 4px rgba(255, 255, 255, 0.5);
    }
    .puff-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      transform: none;
    }

    .puff-btn.primary {
      flex: 1;
      background: linear-gradient(180deg, var(--mint-200) 0%, var(--mint-300) 100%);
      color: var(--ink);
      box-shadow:
        0 8px 18px rgba(146, 212, 175, 0.32),
        0 2px 4px rgba(60, 110, 84, 0.08),
        inset 0 1px 0 rgba(255, 255, 255, 0.7),
        inset 0 -2px 0 rgba(76, 130, 100, 0.10);
    }
    .puff-btn.primary:hover {
      background: linear-gradient(180deg, var(--mint-100) 0%, var(--mint-300) 100%);
      box-shadow:
        0 12px 24px rgba(146, 212, 175, 0.40),
        0 3px 6px rgba(60, 110, 84, 0.10),
        inset 0 1px 0 rgba(255, 255, 255, 0.7);
    }
    .puff-btn.primary.saved {
      background: linear-gradient(180deg, #fef0f5 0%, var(--pink-blush) 100%);
      box-shadow:
        0 8px 18px rgba(247, 200, 210, 0.45),
        inset 0 1px 0 rgba(255, 255, 255, 0.7);
    }

    .puff-btn.send {
      background: linear-gradient(180deg, var(--mint-400) 0%, var(--mint-500) 100%);
      color: white;
      padding: 12px 20px;
      box-shadow:
        0 8px 18px rgba(109, 191, 148, 0.42),
        inset 0 1px 0 rgba(255, 255, 255, 0.4);
    }
    .puff-btn.send:hover {
      box-shadow:
        0 12px 22px rgba(109, 191, 148, 0.50),
        inset 0 1px 0 rgba(255, 255, 255, 0.4);
    }

    .puff-btn.icon {
      padding: 12px 14px;
      background: rgba(255, 255, 255, 0.6);
      color: var(--ink-soft);
      box-shadow:
        0 2px 6px rgba(60, 110, 84, 0.08),
        inset 0 1px 0 rgba(255, 255, 255, 0.95);
    }
    .puff-btn.icon-large {
      flex: 0 0 auto;
      padding: 12px 16px;
      font-size: 18px;
    }
    .puff-btn.ghost {
      background: transparent;
      color: var(--ink-mute);
      border: 1px solid rgba(146, 212, 175, 0.3);
      box-shadow: none;
    }
    .puff-btn.ghost:hover {
      background: rgba(255, 255, 255, 0.4);
      box-shadow: 0 4px 10px rgba(60, 110, 84, 0.06);
    }

    .chat-input {
      flex: 1;
      min-width: 0;
      font-family: 'Pretendard', sans-serif;
      font-weight: 500;
      font-size: 14px;
      padding: 12px 16px;
      background: rgba(255, 255, 255, 0.85);
      border: 1px solid rgba(255, 255, 255, 0.7);
      border-radius: 18px;
      color: var(--ink);
      outline: none;
      box-shadow:
        inset 2px 3px 8px rgba(76, 130, 100, 0.10),
        inset -1px -2px 4px rgba(255, 255, 255, 0.7);
      transition: all 0.2s ease;
    }
    .chat-input::placeholder { color: var(--ink-mute); font-weight: 400; }
    .chat-input:focus {
      background: white;
      box-shadow:
        inset 2px 3px 8px rgba(76, 130, 100, 0.12),
        0 0 0 3px rgba(146, 212, 175, 0.25);
    }
    .input-hint {
      font-family: 'Pretendard', sans-serif;
      font-size: 11px;
      color: var(--ink-mute);
      text-align: center;
      margin-top: 8px;
      font-weight: 400;
    }
    .brand-footer {
      margin-top: 16px;
      text-align: center;
      font-family: 'Nanum Pen Script', cursive;
      font-size: 13px;
      letter-spacing: 4px;
      color: var(--ink-mute);
      opacity: 0.6;
    }

    /* 떠오르는 하트 */
    .floating-heart {
      position: absolute;
      pointer-events: none;
      font-size: 22px;
      animation: heartFloat 1.3s ease-out forwards;
      z-index: 10;
      filter: drop-shadow(0 2px 4px rgba(247, 150, 170, 0.5));
    }

    /* ───────────────────────────────────────────────────────────
       인트로 화면
    ─────────────────────────────────────────────────────────── */
    .intro-shell {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 28px 18px;
      overflow: hidden;
    }
    .intro-stack {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
      max-width: 360px;
    }
    .intro-character {
      opacity: 0;
      margin-bottom: -8px;
      position: relative;
      transition: opacity 0.3s ease;
    }
    .intro-character.visible { opacity: 1; }
    .intro-character.arriving { animation: arriving 1s cubic-bezier(0.22, 1, 0.36, 1) forwards; }
    .intro-character.floating { animation: floatIntro 4s ease-in-out infinite; }

    .intro-bubble {
      width: 100%;
      background: rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border: 1px solid rgba(255, 255, 255, 0.9);
      border-radius: 24px;
      padding: 18px 20px 14px;
      position: relative;
      cursor: pointer;
      min-height: 96px;
      box-shadow:
        0 14px 30px rgba(60, 110, 84, 0.12),
        0 4px 8px rgba(60, 110, 84, 0.06),
        inset 0 1px 0 rgba(255, 255, 255, 0.95);
      animation: bubblePop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }
    .intro-bubble::before {
      content: '';
      position: absolute;
      top: -9px; left: 50%;
      transform: translateX(-50%);
      width: 18px; height: 18px;
      background: rgba(255, 255, 255, 0.85);
      border-top: 1px solid rgba(255, 255, 255, 0.9);
      border-left: 1px solid rgba(255, 255, 255, 0.9);
      border-radius: 5px 0 0 0;
      transform: translateX(-50%) rotate(45deg);
    }
    .intro-text {
      font-family: 'Pretendard', sans-serif;
      font-weight: 500;
      font-size: 14.5px;
      color: var(--ink);
      line-height: 1.7;
      white-space: pre-line;
      min-height: 50px;
    }
    .intro-text .caret { opacity: 0.4; color: var(--mint-500); }
    .intro-progress {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 12px;
    }
    .intro-dots { display: flex; gap: 5px; }
    .intro-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: rgba(146, 212, 175, 0.25);
      transition: all 0.3s;
    }
    .intro-dot.active {
      background: var(--mint-400);
      box-shadow: 0 0 0 3px rgba(146, 212, 175, 0.25);
    }
    .intro-dot.done { background: rgba(146, 212, 175, 0.5); }
    .intro-next {
      font-family: 'Pretendard', sans-serif;
      font-weight: 600;
      font-size: 13px;
      letter-spacing: 0.3px;
      padding: 7px 16px;
      background: linear-gradient(180deg, var(--mint-200) 0%, var(--mint-300) 100%);
      color: var(--ink);
      border: 1px solid rgba(255, 255, 255, 0.7);
      border-radius: 14px;
      cursor: pointer;
      box-shadow:
        0 4px 10px rgba(146, 212, 175, 0.32),
        inset 0 1px 0 rgba(255, 255, 255, 0.7);
      transition: all 0.15s;
    }
    .intro-next:hover { transform: translateY(-1px); }
    .intro-next:active { transform: translateY(1px) scale(0.97); }

    .nick-section {
      width: 100%;
      margin-top: 16px;
      animation: nickFade 0.5s ease forwards;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .nick-label {
      font-family: 'Pretendard', sans-serif;
      font-weight: 500;
      font-size: 14px;
      color: var(--ink-soft);
      text-align: center;
      opacity: 0.85;
      letter-spacing: 0.3px;
    }
    .nick-row { display: flex; gap: 10px; }
    .nick-input {
      flex: 1;
      font-family: 'Pretendard', sans-serif;
      font-weight: 500;
      font-size: 14px;
      padding: 12px 16px;
      background: rgba(255, 255, 255, 0.85);
      border: 1px solid rgba(255, 255, 255, 0.7);
      border-radius: 18px;
      color: var(--ink);
      outline: none;
      box-shadow:
        inset 2px 3px 8px rgba(76, 130, 100, 0.10),
        inset -1px -2px 4px rgba(255, 255, 255, 0.7);
    }
    .nick-input::placeholder { color: var(--ink-mute); font-weight: 400; }
    .nick-input:focus {
      background: white;
      box-shadow:
        inset 2px 3px 8px rgba(76, 130, 100, 0.12),
        0 0 0 3px rgba(146, 212, 175, 0.25);
    }
    .intro-brand {
      margin-top: 22px;
      font-family: 'Nanum Pen Script', cursive;
      font-size: 13px;
      letter-spacing: 5px;
      color: var(--ink-mute);
      opacity: 0.45;
      text-align: center;
    }

    /* ───────────────────────────────────────────────────────────
       일기 모달
    ─────────────────────────────────────────────────────────── */
    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(76, 130, 100, 0.32);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      padding: 20px;
      animation: nickFade 0.3s ease;
    }
    .diary-card {
      background: rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(18px);
      border: 1px solid rgba(255, 255, 255, 0.95);
      border-radius: 28px;
      padding: 24px 22px;
      width: 360px;
      max-width: 100%;
      box-shadow:
        0 24px 50px rgba(60, 110, 84, 0.20),
        0 8px 16px rgba(60, 110, 84, 0.10),
        inset 0 1px 0 rgba(255, 255, 255, 0.95);
      font-family: 'Pretendard', sans-serif;
    }
    .diary-header {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 600;
      font-size: 16px;
      color: var(--ink);
      margin-bottom: 4px;
    }
    .diary-date {
      font-size: 12px;
      color: var(--ink-mute);
      margin-bottom: 14px;
    }
    .diary-input {
      width: 100%;
      font-family: 'Pretendard', sans-serif;
      font-weight: 500;
      font-size: 14px;
      padding: 12px 14px;
      background: rgba(243, 251, 246, 0.7);
      border: 1px solid rgba(146, 212, 175, 0.25);
      border-radius: 16px;
      resize: none;
      height: 90px;
      color: var(--ink);
      outline: none;
      box-shadow:
        inset 2px 3px 8px rgba(76, 130, 100, 0.06),
        inset -1px -2px 4px rgba(255, 255, 255, 0.7);
      transition: all 0.2s;
      box-sizing: border-box;
    }
    .diary-input:focus {
      background: white;
      box-shadow:
        inset 2px 3px 8px rgba(76, 130, 100, 0.10),
        0 0 0 3px rgba(146, 212, 175, 0.20);
    }
    .diary-input::placeholder { color: var(--ink-mute); font-weight: 400; }
    .diary-actions {
      display: flex;
      gap: 10px;
      margin-top: 12px;
    }
    .diary-history {
      margin-top: 18px;
      padding-top: 14px;
      border-top: 1px dashed rgba(146, 212, 175, 0.4);
    }
    .diary-history-title {
      font-weight: 600;
      font-size: 13px;
      color: var(--ink-soft);
      margin-bottom: 8px;
    }
    .diary-history-row {
      font-size: 13px;
      color: var(--ink);
      padding: 6px 0;
      border-bottom: 1px dotted rgba(146, 212, 175, 0.3);
      display: flex;
      gap: 8px;
      font-weight: 400;
    }
    .diary-history-row:last-child { border-bottom: none; }
    .diary-history-date {
      color: var(--ink-mute);
      font-size: 11px;
      flex-shrink: 0;
      align-self: center;
    }
    .diary-history-mood { flex: 1; }

    /* 모바일 미세 조정 */
    @media (max-width: 420px) {
      .device-frame { padding: 18px 14px 22px; border-radius: 32px; }
      .screen { height: 420px; }
      .bambami-img { width: 180px; }
    }

    /* ───────────────────────────────────────────────────────────
       친밀도 칩 (정보바)
    ─────────────────────────────────────────────────────────── */
    .bond-chip {
      display: flex; align-items: center; gap: 5px;
      font-family: 'Pretendard', sans-serif;
      font-size: 11px; font-weight: 600;
      color: var(--ink-soft);
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.85) 0%, rgba(230, 247, 236, 0.7) 100%);
      backdrop-filter: blur(8px);
      padding: 4px 10px;
      border-radius: 20px;
      border: 1px solid rgba(255, 255, 255, 0.7);
      cursor: pointer;
      box-shadow:
        0 2px 6px rgba(60, 110, 84, 0.08),
        inset 0 1px 0 rgba(255, 255, 255, 0.95);
      transition: all 0.2s;
    }
    .bond-chip:hover { transform: translateY(-1px); box-shadow: 0 4px 10px rgba(60, 110, 84, 0.12); }
    .bond-chip:active { transform: translateY(0) scale(0.97); }
    .bond-chip-name { font-weight: 700; color: var(--ink); }

    /* ───────────────────────────────────────────────────────────
       메뉴 패널
    ─────────────────────────────────────────────────────────── */
    .modal-backdrop.menu { align-items: flex-end; padding: 16px; }
    .menu-panel {
      width: 100%; max-width: 400px;
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.95);
      border-radius: 28px;
      padding: 22px 20px;
      box-shadow:
        0 28px 60px rgba(60, 110, 84, 0.24),
        0 8px 16px rgba(60, 110, 84, 0.12),
        inset 0 1px 0 rgba(255, 255, 255, 0.95);
      animation: slideUp 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
      max-height: 92vh;
      overflow-y: auto;
    }
    @keyframes slideUp {
      from { transform: translateY(40px); opacity: 0; }
      to   { transform: translateY(0); opacity: 1; }
    }
    .daily-card {
      padding: 16px 18px;
      background: linear-gradient(160deg, rgba(217, 240, 226, 0.7) 0%, rgba(252, 234, 239, 0.5) 100%);
      border: 1px solid rgba(255, 255, 255, 0.7);
      border-radius: 20px;
      margin-bottom: 12px;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.95);
    }
    .daily-card-label {
      font-size: 11px; color: var(--ink-mute);
      font-weight: 600; letter-spacing: 1px;
      margin-bottom: 6px;
    }
    .daily-card-text {
      font-family: 'Pretendard', sans-serif;
      font-size: 15px; font-weight: 500;
      color: var(--ink); line-height: 1.5;
    }
    .late-night-card {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 14px;
      background: linear-gradient(160deg, rgba(212, 197, 221, 0.4), rgba(168, 184, 216, 0.3));
      border: 1px solid rgba(255, 255, 255, 0.6);
      border-radius: 16px;
      margin-bottom: 12px;
      font-size: 13px; font-weight: 500; color: var(--ink-soft);
    }
    .menu-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
    }
    .menu-item {
      display: flex; align-items: center; gap: 14px;
      padding: 13px 14px;
      background: rgba(255, 255, 255, 0.6);
      border: 1px solid rgba(255, 255, 255, 0.8);
      border-radius: 16px;
      cursor: pointer;
      text-align: left;
      transition: all 0.18s;
      box-shadow: 0 2px 6px rgba(60, 110, 84, 0.05);
      font-family: 'Pretendard', sans-serif;
    }
    .menu-item:hover {
      background: rgba(255, 255, 255, 0.85);
      transform: translateY(-1px);
      box-shadow: 0 6px 14px rgba(60, 110, 84, 0.10);
    }
    .menu-item:active { transform: translateY(0) scale(0.98); }
    .menu-item-emoji {
      font-size: 22px;
      width: 38px; height: 38px;
      display: flex; align-items: center; justify-content: center;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.9), rgba(230, 247, 236, 0.5));
      border-radius: 12px;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.95);
    }
    .menu-item-text { flex: 1; }
    .menu-item-label {
      font-size: 14px; font-weight: 600;
      color: var(--ink);
      display: flex; align-items: center; gap: 6px;
    }
    .menu-item-desc {
      font-size: 11.5px; color: var(--ink-mute);
      margin-top: 2px;
    }
    .menu-item-badge {
      display: inline-flex; align-items: center; justify-content: center;
      width: 16px; height: 16px;
      background: var(--pink-blush);
      color: white; font-size: 10px; font-weight: 700;
      border-radius: 50%;
      box-shadow: 0 1px 3px rgba(247, 200, 210, 0.6);
    }

    /* ───────────────────────────────────────────────────────────
       친밀도 모달
    ─────────────────────────────────────────────────────────── */
    .bond-stage-card {
      padding: 18px;
      background: linear-gradient(160deg, var(--mint-100) 0%, var(--mint-200) 100%);
      border: 1px solid rgba(255, 255, 255, 0.7);
      border-radius: 18px;
      text-align: center;
      margin-bottom: 14px;
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.95),
        0 4px 10px rgba(146, 212, 175, 0.20);
    }
    .bond-stage-name {
      font-size: 22px; font-weight: 700;
      color: var(--ink); letter-spacing: 0.5px;
    }
    .bond-stage-desc {
      font-size: 13px; color: var(--ink-soft);
      margin-top: 4px;
    }
    .bond-progress-wrap { margin-bottom: 16px; }
    .bond-progress-bar {
      height: 10px;
      background: rgba(146, 212, 175, 0.2);
      border-radius: 6px;
      overflow: hidden;
      box-shadow: inset 1px 2px 4px rgba(76, 130, 100, 0.1);
    }
    .bond-progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--mint-300), var(--mint-500));
      border-radius: 6px;
      transition: width 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
      box-shadow: 0 1px 2px rgba(109, 191, 148, 0.4);
    }
    .bond-progress-label {
      font-size: 11px; color: var(--ink-mute);
      text-align: right; margin-top: 6px;
    }
    .bond-stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-bottom: 16px;
    }
    .bond-stat-item {
      padding: 10px 8px;
      background: rgba(243, 251, 246, 0.7);
      border: 1px solid rgba(255, 255, 255, 0.6);
      border-radius: 14px;
      text-align: center;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.7);
    }
    .bond-stat-num {
      font-size: 18px; font-weight: 700;
      color: var(--ink);
    }
    .bond-stat-label {
      font-size: 10px; color: var(--ink-mute);
      margin-top: 2px;
    }
    .bond-stages-list {
      display: flex; flex-direction: column; gap: 4px;
      padding: 10px;
      background: rgba(243, 251, 246, 0.5);
      border-radius: 14px;
    }
    .bond-stage-row {
      display: flex; align-items: center; gap: 10px;
      padding: 6px 8px;
      font-size: 13px;
      opacity: 0.4;
      transition: opacity 0.3s;
    }
    .bond-stage-row.reached { opacity: 1; }
    .bond-stage-emoji { font-size: 16px; }
    .bond-stage-rname { flex: 1; font-weight: 500; color: var(--ink); }
    .bond-stage-min { font-size: 11px; color: var(--ink-mute); font-variant-numeric: tabular-nums; }

    /* ───────────────────────────────────────────────────────────
       기분 트래커
    ─────────────────────────────────────────────────────────── */
    .mood-options {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 6px;
      margin: 4px 0 16px;
    }
    .mood-btn {
      display: flex; flex-direction: column; align-items: center; gap: 4px;
      padding: 10px 4px;
      background: rgba(255, 255, 255, 0.7);
      border: 1.5px solid transparent;
      border-radius: 14px;
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
      box-shadow:
        0 2px 4px rgba(60, 110, 84, 0.05),
        inset 0 1px 0 rgba(255, 255, 255, 0.95);
    }
    .mood-btn:hover { transform: translateY(-2px); }
    .mood-btn.selected {
      background: linear-gradient(180deg, var(--mint-100), var(--mint-200));
      border-color: var(--mint-400);
      box-shadow:
        0 4px 12px rgba(146, 212, 175, 0.40),
        inset 0 1px 0 rgba(255, 255, 255, 0.95);
    }
    .mood-emoji { font-size: 22px; }
    .mood-label { font-size: 10px; color: var(--ink-soft); font-weight: 500; }
    .mood-history {
      padding-top: 14px;
      border-top: 1px dashed rgba(146, 212, 175, 0.4);
    }
    .mood-history-title {
      font-size: 12px; font-weight: 600;
      color: var(--ink-soft); margin-bottom: 10px;
    }
    .mood-graph {
      display: flex; align-items: flex-end; justify-content: space-between;
      height: 80px; gap: 4px;
      padding: 0 2px;
    }
    .mood-bar-col {
      flex: 1;
      display: flex; flex-direction: column; align-items: center; gap: 4px;
      height: 100%;
      justify-content: flex-end;
    }
    .mood-bar {
      width: 100%;
      min-height: 16px;
      border-radius: 6px 6px 2px 2px;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.4);
      transition: height 0.5s ease;
    }
    .mood-bar-emoji { font-size: 14px; }
    .mood-message {
      margin-top: 12px;
      padding: 10px 12px;
      background: rgba(243, 251, 246, 0.7);
      border-radius: 12px;
      font-size: 13px; color: var(--ink); font-weight: 500;
      text-align: center;
    }

    /* ───────────────────────────────────────────────────────────
       호흡 모드
    ─────────────────────────────────────────────────────────── */
    .breathing-card {
      background: linear-gradient(165deg, rgba(255, 255, 255, 0.95) 0%, rgba(230, 247, 236, 0.85) 100%);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.95);
      border-radius: 28px;
      padding: 24px 22px;
      width: 360px; max-width: 100%;
      box-shadow:
        0 24px 50px rgba(60, 110, 84, 0.20),
        inset 0 1px 0 rgba(255, 255, 255, 0.95);
      font-family: 'Pretendard', sans-serif;
      animation: slideUp 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .breathing-header {
      display: flex; align-items: center; gap: 8px;
      font-weight: 600; font-size: 16px;
      color: var(--ink); margin-bottom: 16px;
    }
    .breathing-stage {
      display: flex; flex-direction: column; align-items: center; gap: 14px;
      padding: 24px 0 18px;
    }
    .breathing-ball {
      width: 160px; height: 160px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, rgba(255, 255, 255, 0.9), var(--mint-300) 70%, var(--mint-400));
      box-shadow:
        0 12px 32px rgba(146, 212, 175, 0.5),
        0 4px 8px rgba(60, 110, 84, 0.10),
        inset -8px -10px 24px rgba(76, 130, 100, 0.18),
        inset 8px 10px 24px rgba(255, 255, 255, 0.6);
      display: flex; align-items: center; justify-content: center;
    }
    .breathing-ball-inner {
      width: 100%; height: 100%;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
    }
    .breathing-count {
      font-size: 36px; font-weight: 700;
      color: white;
      text-shadow: 0 2px 8px rgba(60, 110, 84, 0.3);
      font-variant-numeric: tabular-nums;
    }
    .breathing-text {
      font-size: 18px; font-weight: 600;
      color: var(--ink); letter-spacing: 0.5px;
    }
    .breathing-sub {
      font-size: 13px; color: var(--ink-mute);
      margin-top: -8px;
    }
    .breathing-cycle {
      display: flex; gap: 8px; margin-top: 4px;
    }
    .breathing-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: rgba(146, 212, 175, 0.3);
      transition: all 0.3s;
    }
    .breathing-dot.active {
      background: var(--mint-400);
      box-shadow: 0 0 0 3px rgba(146, 212, 175, 0.3);
    }
    .breathing-dot.done { background: var(--mint-300); }
    .breathing-actions {
      display: flex; gap: 10px;
      margin-top: 8px;
    }
    .breathing-actions .puff-btn { flex: 1; }

    /* ───────────────────────────────────────────────────────────
       메모 (할 일 맡기기)
    ─────────────────────────────────────────────────────────── */
    .memo-input-row {
      display: flex; gap: 8px;
      margin: 4px 0 14px;
    }
    .memo-list {
      max-height: 280px;
      overflow-y: auto;
      padding-right: 2px;
    }
    .memo-empty {
      text-align: center;
      font-size: 13px;
      color: var(--ink-mute);
      padding: 18px 0;
      line-height: 1.6;
    }
    .memo-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 12px;
      background: rgba(255, 255, 255, 0.7);
      border: 1px solid rgba(255, 255, 255, 0.7);
      border-radius: 14px;
      margin-bottom: 6px;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.95);
      transition: all 0.2s;
    }
    .memo-item.done { opacity: 0.5; }
    .memo-item.done .memo-text { text-decoration: line-through; color: var(--ink-mute); }
    .memo-check {
      width: 22px; height: 22px;
      border-radius: 50%;
      border: 1.5px solid var(--mint-400);
      background: white;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; color: transparent;
      cursor: pointer;
      flex-shrink: 0;
      transition: all 0.2s;
    }
    .memo-check:hover { background: var(--mint-100); }
    .memo-check.checked {
      background: var(--mint-400); color: white;
      border-color: var(--mint-500);
    }
    .memo-text {
      flex: 1; font-size: 14px; color: var(--ink); font-weight: 500;
      word-break: keep-all;
    }
    .memo-date {
      font-size: 10px; color: var(--ink-mute);
      flex-shrink: 0;
    }
    .memo-del {
      background: transparent; border: none;
      color: var(--ink-mute); font-size: 18px;
      cursor: pointer;
      padding: 0; width: 22px; height: 22px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      border-radius: 50%;
      transition: all 0.2s;
    }
    .memo-del:hover { background: rgba(247, 200, 210, 0.3); color: var(--ink); }
    .memo-done-section {
      margin-top: 14px;
      padding-top: 12px;
      border-top: 1px dashed rgba(146, 212, 175, 0.4);
    }
    .memo-done-title {
      font-size: 11px; font-weight: 600;
      color: var(--ink-mute); margin-bottom: 6px;
      letter-spacing: 0.5px;
    }

    /* ───────────────────────────────────────────────────────────
       추억
    ─────────────────────────────────────────────────────────── */
    .memories-list {
      max-height: 360px;
      overflow-y: auto;
      padding-right: 2px;
      display: flex; flex-direction: column; gap: 8px;
    }
    .memory-card {
      padding: 12px 14px;
      background: linear-gradient(160deg, rgba(255, 255, 255, 0.85) 0%, rgba(243, 251, 246, 0.7) 100%);
      border: 1px solid rgba(255, 255, 255, 0.7);
      border-radius: 14px;
      box-shadow:
        0 2px 6px rgba(60, 110, 84, 0.05),
        inset 0 1px 0 rgba(255, 255, 255, 0.95);
    }
    .memory-date {
      font-size: 10px; color: var(--ink-mute);
      margin-bottom: 4px;
      letter-spacing: 0.5px;
    }
    .memory-user {
      font-size: 13px; font-weight: 500;
      color: var(--ink);
      margin-bottom: 2px;
      line-height: 1.5;
    }
    .memory-reply {
      font-size: 12.5px; color: var(--ink-soft);
      line-height: 1.5;
      padding-left: 4px;
    }

    /* ───────────────────────────────────────────────────────────
       음악 박스
    ─────────────────────────────────────────────────────────── */
    .sounds-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin: 8px 0 14px;
    }
    .sound-card {
      display: flex; flex-direction: column; gap: 4px;
      padding: 14px 12px;
      background: rgba(255, 255, 255, 0.7);
      border: 1.5px solid transparent;
      border-radius: 16px;
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
      text-align: left;
      box-shadow:
        0 2px 6px rgba(60, 110, 84, 0.06),
        inset 0 1px 0 rgba(255, 255, 255, 0.95);
      position: relative;
      overflow: hidden;
    }
    .sound-card:hover { transform: translateY(-2px); }
    .sound-card.playing {
      background: linear-gradient(160deg, var(--mint-100), var(--mint-200));
      border-color: var(--mint-400);
      box-shadow:
        0 6px 16px rgba(146, 212, 175, 0.35),
        inset 0 1px 0 rgba(255, 255, 255, 0.95);
    }
    .sound-emoji { font-size: 22px; }
    .sound-name { font-size: 14px; font-weight: 600; color: var(--ink); }
    .sound-desc { font-size: 11px; color: var(--ink-mute); }
    .sound-wave {
      position: absolute;
      top: 12px; right: 12px;
      font-size: 9px; color: var(--mint-500);
      letter-spacing: 1px;
      animation: soundPulse 1.2s ease-in-out infinite;
    }
    @keyframes soundPulse {
      0%, 100% { opacity: 0.4; }
      50%      { opacity: 1; }
    }
    .sound-volume {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 12px;
      background: rgba(243, 251, 246, 0.7);
      border-radius: 14px;
      margin-top: 4px;
    }
    .sound-vol-label { font-size: 14px; color: var(--ink-mute); }
    .sound-vol-slider {
      flex: 1;
      height: 4px;
      background: rgba(146, 212, 175, 0.3);
      border-radius: 2px;
      outline: none;
      -webkit-appearance: none;
      appearance: none;
    }
    .sound-vol-slider::-webkit-slider-thumb {
      -webkit-appearance: none; appearance: none;
      width: 18px; height: 18px;
      background: linear-gradient(180deg, var(--mint-300), var(--mint-500));
      border: 2px solid white;
      border-radius: 50%;
      cursor: pointer;
      box-shadow: 0 2px 6px rgba(76, 130, 100, 0.3);
    }
    .sound-vol-slider::-moz-range-thumb {
      width: 18px; height: 18px;
      background: linear-gradient(180deg, var(--mint-300), var(--mint-500));
      border: 2px solid white;
      border-radius: 50%;
      cursor: pointer;
      box-shadow: 0 2px 6px rgba(76, 130, 100, 0.3);
    }

  </style>

    const LS = {
      get: (k, def) => { try { const v = localStorage.getItem(k); return v !== null ? JSON.parse(v) : def; } catch { return def; } },
      set: (k, v) => { try { localStorage.setItem(k, JSON.stringify(v)); } catch {} },
    };

    /* ─── 시간대 ─────────────────────────────────────────────── */
    function getTimeMood(hour) {
      if (hour >= 0 && hour < 5)  return 'midnight';
      if (hour >= 5 && hour < 10) return 'dawn';
      if (hour >= 10 && hour < 17) return 'day';
      if (hour >= 17 && hour < 21) return 'sunset';
      return 'night';
    }
    function getTimeIntroLine(hour) {
      const mm = String(new Date().getMinutes()).padStart(2,'0');
      if (hour >= 0 && hour < 5)
        return `AM ${String(hour).padStart(2,'0')}:${mm}.\n잠들지 못하는 깊은 새벽에도,\n나는 여기서 항상 널 기다리고 있을게.`;
      if (hour >= 5 && hour < 8)
        return `이른 아침부터 일어났구나.\n새벽 공기처럼 상쾌한 하루가\n될 거야, 분명히.`;
      if (hour >= 8 && hour < 12)
        return `${hour}시의 햇살처럼 따뜻하게,\n오늘 하루도 네 곁에\n있어줄게.`;
      if (hour >= 12 && hour < 14)
        return `점심 시간에 나를 찾아줬구나.\n밥은 먹었어? 오늘도\n같이 있어줄게.`;
      if (hour >= 14 && hour < 17)
        return `나른한 오후에 와줘서 기뻐.\n잠깐 쉬어가도 괜찮아,\n여기 있을게.`;
      if (hour >= 17 && hour < 20)
        return `해가 지는 시간에 와줬네.\n오늘 하루 수고 많았어,\n천천히 쉬어가자.`;
      return `밤이 깊어지고 있어.\n오늘 하루 잘 버텼어,\n나랑 같이 쉬어가자.`;
    }
    function getIntroLines(hour) {

    function findEmotionReply(text, nickname) {
      if (text.includes('네 이름') || text.includes('너 이름') || text.includes('뱀뱀이 이름'))
        return { emotion: 'greeting', reply: '나는 뱀뱀이야! 💗 기억해줘!' };
      if ((text.includes('내 이름') || text.includes('나 이름') || text.includes('내이름')) && nickname && nickname !== '너')
        return { emotion: 'love', reply: `나의 소중한 친구 ${nickname}! 이름 기억하고 있어 💗` };
      if (nickname && nickname !== '너' && text.includes(nickname))
        return { emotion: 'love', reply: `${nickname}아, 불렀어? 나 여기 있어! 💗` };
      for (const [emotion, data] of Object.entries(EMOTION_RESPONSES)) {
        for (const keyword of data.keywords) {
          if (text.includes(keyword))
            return { emotion, reply: data.replies[Math.floor(Math.random() * data.replies.length)] };
        }
      }
      return null;
    }

       – 단계별로 뱀뱀이가 부르는 호칭/대사 톤이 달라짐
    ─────────────────────────────────────────────────────────── */
    const BOND_STAGES = [
      { min: 0,   name: '첫만남',   emoji: '🌱', desc: '아직 어색하지만 반가워' },
      { min: 20,  name: '친구',     emoji: '🌿', desc: '같이 있는 게 익숙해' },
      { min: 60,  name: '단짝',     emoji: '🌳', desc: '너랑 있을 때 제일 편해' },
      { min: 150, name: '소울메이트', emoji: '✨', desc: '어떤 날에도 너의 편' },
      { min: 300, name: '평생친구', emoji: '💗', desc: '말 안 해도 다 알지' },
    ];
    function getBondStage(bond) {
      let stage = BOND_STAGES[0];
      for (const s of BOND_STAGES) if (bond >= s.min) stage = s;
      return stage;
    }
    function getBondProgress(bond) {
      const stage = getBondStage(bond);
      const idx = BOND_STAGES.indexOf(stage);
      const next = BOND_STAGES[idx + 1];
      if (!next) return { stage, pct: 100, toNext: 0, isMax: true };
      const span = next.min - stage.min;
      const into = bond - stage.min;
      return { stage, pct: Math.min(100, (into / span) * 100), toNext: next.min - bond, next, isMax: false };
    }

    function calcStreak() {
      const today = new Date().toDateString();

      const streak = LS.get('bambami_streak', 0);
      if (last === today) return streak;
      const yesterday = new Date(Date.now() - 86400000).toDateString();
      const newStreak = last === yesterday ? streak + 1 : 1;
      LS.set('bambami_last_date', today);
      LS.set('bambami_streak', newStreak);
      return newStreak;

    /* ───────────────────────────────────────────────────────────
       호흡 모드 모달 (4-7-8)
    ─────────────────────────────────────────────────────────── */
    function BreathingModal({ onClose, onComplete }) {
      const [phase, setPhase] = useState('ready'); // ready | inhale | hold | exhale | done
      const [count, setCount] = useState(0);
      const [cycle, setCycle] = useState(0);
      const TOTAL_CYCLES = 3;
      const phaseRef = useRef(phase);
      phaseRef.current = phase;

      useEffect(() => {
        if (phase === 'ready' || phase === 'done') return;
        const durations = { inhale: 4, hold: 7, exhale: 8 };
        const dur = durations[phase];
        setCount(dur);
        const iv = setInterval(() => {
          setCount(c => {
            if (c <= 1) {
              clearInterval(iv);
              setTimeout(() => {
                if (phase === 'inhale') setPhase('hold');
                else if (phase === 'hold') setPhase('exhale');
                else if (phase === 'exhale') {
                  setCycle(cy => {
                    const nextCy = cy + 1;
                    if (nextCy >= TOTAL_CYCLES) {
                      setPhase('done');
                      onComplete && onComplete();
                    } else {
                      setPhase('inhale');
                    }
                    return nextCy;
                  });
                }
              }, 100);
              return 0;
            }
            return c - 1;
          });
        }, 1000);
        return () => clearInterval(iv);
      }, [phase]);

      const phaseLabel = {
        ready:  { text: '준비됐어?', sub: '같이 4-7-8 호흡 해보자' },
        inhale: { text: '들이쉬어 ◯',  sub: '코로 천천히' },
        hold:   { text: '잠깐 멈추고 ✦', sub: '편안하게' },
        exhale: { text: '내쉬어 ⌣',     sub: '입으로 후~' },
        done:   { text: '잘했어 💗',     sub: '마음이 조금 가벼워졌길' },
      }[phase];

      const ballScale = phase === 'inhale' ? 1 : phase === 'exhale' ? 0.5 : phase === 'hold' ? 1 : 0.7;
      const ballTransition = phase === 'inhale' ? '4s' : phase === 'exhale' ? '8s' : phase === 'hold' ? '0.3s' : '0.5s';

      return (
        <div className="modal-backdrop" onClick={onClose}>
          <div className="breathing-card" onClick={e => e.stopPropagation()}>
            <div className="breathing-header">
              <span style={{ fontSize: '20px' }}>🌬️</span>
              <span>같이 숨 쉬어볼까</span>
            </div>

            <div className="breathing-stage">
              <div className="breathing-ball" style={{
                transform: `scale(${ballScale})`,
                transition: `transform ${ballTransition} cubic-bezier(0.4, 0, 0.2, 1)`,
              }}>
                <div className="breathing-ball-inner">
                  {phase !== 'ready' && phase !== 'done' && <span className="breathing-count">{count}</span>}
                </div>
              </div>
              <div className="breathing-text">{phaseLabel.text}</div>
              <div className="breathing-sub">{phaseLabel.sub}</div>
              {phase !== 'ready' && phase !== 'done' && (
                <div className="breathing-cycle">
                  {Array.from({ length: TOTAL_CYCLES }).map((_, i) => (
                    <div key={i} className={`breathing-dot ${i < cycle ? 'done' : i === cycle ? 'active' : ''}`} />
                  ))}
                </div>
              )}
            </div>

            <div className="breathing-actions">
              {phase === 'ready' && (
                <button className="puff-btn primary" onClick={() => setPhase('inhale')}>시작 🌿</button>
              )}
              {phase === 'done' && (
                <button className="puff-btn primary" onClick={onClose}>마치기 💗</button>
              )}
              {phase !== 'ready' && phase !== 'done' && (
                <button className="puff-btn ghost" onClick={onClose}>그만하기</button>
              )}
            </div>
          </div>
        </div>
      );
    }

    /* ───────────────────────────────────────────────────────────

    ─────────────────────────────────────────────────────────── */
    const SOUND_OPTIONS = [
      { id: 'rain',   emoji: '🌧',  name: '빗소리',     desc: '잔잔한 봄비' },
      { id: 'wave',   emoji: '🌊',  name: '파도',       desc: '느린 해변' },
      { id: 'forest', emoji: '🌲',  name: '숲',         desc: '바람과 잎새' },
      { id: 'noise',  emoji: '☁️',  name: '화이트노이즈', desc: '집중에 좋아' },
    ];

    function SoundsModal({ onClose }) {
      const [playing, setPlaying] = useState(null);
      const [volume, setVolume] = useState(40);
      const audioCtxRef = useRef(null);
      const nodesRef = useRef([]);

      const cleanup = () => {
        nodesRef.current.forEach(n => { try { n.stop && n.stop(); n.disconnect && n.disconnect(); } catch{} });
        nodesRef.current = [];
        if (audioCtxRef.current) {
          try { audioCtxRef.current.close(); } catch{}
          audioCtxRef.current = null;
        }
      };

      useEffect(() => () => cleanup(), []);

      const startSound = (id) => {
        cleanup();
        if (playing === id) { setPlaying(null); return; }

        const Ctx = window.AudioContext || window.webkitAudioContext;
        if (!Ctx) return;
        const ctx = new Ctx();
        audioCtxRef.current = ctx;

        // 화이트노이즈 버퍼 생성
        const bufferSize = 2 * ctx.sampleRate;
        const noiseBuffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
        const output = noiseBuffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) output[i] = Math.random() * 2 - 1;

        const noise = ctx.createBufferSource();
        noise.buffer = noiseBuffer;
        noise.loop = true;

        // 사운드 종류별로 필터 다르게
        const filter = ctx.createBiquadFilter();
        if (id === 'rain') {
          filter.type = 'bandpass';
          filter.frequency.value = 1200;
          filter.Q.value = 0.5;
        } else if (id === 'wave') {
          filter.type = 'lowpass';
          filter.frequency.value = 400;
          // 파도 효과: LFO로 게인 변조
          const gainOsc = ctx.createOscillator();
          gainOsc.frequency.value = 0.15;
          const gainMod = ctx.createGain();
          gainMod.gain.value = 0.5;
          const baseGain = ctx.createGain();
          baseGain.gain.value = 0.5;
          gainOsc.connect(gainMod.gain);
          baseGain.connect(ctx.destination);
          // (간단히 처리; 정확한 파도는 아니지만 분위기는 살아남)
          gainOsc.start();
          nodesRef.current.push(gainOsc, gainMod);
        } else if (id === 'forest') {
          filter.type = 'highpass';
          filter.frequency.value = 800;
          filter.Q.value = 0.3;
        } else {
          filter.type = 'lowpass';
          filter.frequency.value = 8000;
        }

        const gainNode = ctx.createGain();
        gainNode.gain.value = volume / 100 * 0.3;

        noise.connect(filter);
        filter.connect(gainNode);
        gainNode.connect(ctx.destination);
        noise.start();

        nodesRef.current.push(noise, filter, gainNode);
        setPlaying(id);
      };

      const handleVolume = (v) => {
        setVolume(v);
        if (audioCtxRef.current && nodesRef.current.length) {
          const gain = nodesRef.current.find(n => n.gain && n.gain.value !== undefined);
          if (gain && gain.gain) gain.gain.value = v / 100 * 0.3;
        }
      };

      return (
        <div className="modal-backdrop" onClick={() => { cleanup(); setPlaying(null); onClose(); }}>
          <div className="diary-card" onClick={e => e.stopPropagation()}>
            <div className="diary-header">
              <span style={{ fontSize: '20px' }}>🎵</span>
              <span>마음 진정 음악</span>
            </div>
            <div className="diary-date">눈 감고 잠깐 쉬어가</div>

            <div className="sounds-grid">
              {SOUND_OPTIONS.map(s => (
                <button key={s.id}
                  className={`sound-card ${playing === s.id ? 'playing' : ''}`}
                  onClick={() => startSound(s.id)}>
                  <span className="sound-emoji">{s.emoji}</span>
                  <span className="sound-name">{s.name}</span>
                  <span className="sound-desc">{s.desc}</span>
                  {playing === s.id && <span className="sound-wave">▮▮▮</span>}
                </button>
              ))}
            </div>

            {playing && (
              <div className="sound-volume">
                <span className="sound-vol-label">🔈</span>
                <input type="range" min="0" max="100" value={volume}
                  onChange={e => handleVolume(Number(e.target.value))}
                  className="sound-vol-slider" />
                <span className="sound-vol-label">🔊</span>
              </div>
            )}

            <button className="puff-btn ghost"
              onClick={() => { cleanup(); setPlaying(null); onClose(); }}
              style={{ width: '100%', marginTop: '12px' }}>닫기</button>
          </div>
        </div>
      );
    }

    function IntroScreen({ onComplete }) {

      const INTRO_LINES = getIntroLines(hour);

      const [displayedText, setDisplayedText] = useState('');

      const [showNickname, setShowNickname] = useState(false);
      const [nickname, setNickname] = useState('');
      const [approached, setApproached] = useState(false);
      const [imgVisible, setImgVisible] = useState(false);
      const nicknameRef = useRef(null);
      const typingRef   = useRef(null);

      useEffect(() => {
        const t1 = setTimeout(() => setImgVisible(true), 300);
        const t2 = setTimeout(() => setApproached(true), 1100);
        const t3 = setTimeout(() => setLineIndex(0), 1900);
        return () => { clearTimeout(t1); clearTimeout(t2); clearTimeout(t3); };
      }, []);

      useEffect(() => {
        if (lineIndex < 0 || lineIndex >= INTRO_LINES.length) return;
        setIsTyping(true);
        setDisplayedText('');
        const full = INTRO_LINES[lineIndex];
        let i = 0;
        if (typingRef.current) clearInterval(typingRef.current);
        typingRef.current = setInterval(() => {
          i++;
          setDisplayedText(full.slice(0, i));
          if (i >= full.length) { clearInterval(typingRef.current); setIsTyping(false); }
        }, 36);
        return () => clearInterval(typingRef.current);
      }, [lineIndex]);

      const handleNext = () => {
        if (isTyping) {
          clearInterval(typingRef.current);
          setDisplayedText(INTRO_LINES[lineIndex]);
          setIsTyping(false);
          return;
        }
        if (lineIndex < INTRO_LINES.length - 1) {
          setLineIndex(p => p + 1);
        } else {
          setShowNickname(true);
          setTimeout(() => nicknameRef.current && nicknameRef.current.focus(), 100);
        }
      };

      const handleStart = () => onComplete(nickname.trim() || '너');
      const handleKeyNick = e => { if (e.key === 'Enter') handleStart(); };
      const isLastLine = lineIndex === INTRO_LINES.length - 1 && !isTyping;

      return (
        <div className="intro-shell">
          <div className="intro-stack">
            <div className={`intro-character ${approached ? 'floating' : 'arriving'} ${imgVisible ? 'visible' : ''}`}>

              <div className="intro-bubble" onClick={handleNext} key={lineIndex}>
                <div className="intro-text">
                  {displayedText}
                  {isTyping && <span className="caret">▍</span>}
                </div>
                <div className="intro-progress">
                  <div className="intro-dots">
                    {INTRO_LINES.map((_, i) => (
                      <div key={i} className={`intro-dot ${i === lineIndex ? 'active' : i < lineIndex ? 'done' : ''}`} />
                    ))}
                  </div>
                  {!isTyping && (
                    <button className="intro-next" onClick={e => { e.stopPropagation(); handleNext(); }}>
                      {isLastLine ? '💗' : '다음 ▸'}
                    </button>
                  )}
                </div>
              </div>
            )}

            {showNickname && (
              <div className="nick-section">
                <div className="nick-label">✦ 너의 이름을 알려줄래? ✦</div>
                <div className="nick-row">
                  <input ref={nicknameRef} className="nick-input" type="text"
                    placeholder="닉네임 (없어도 괜찮아)"
                    value={nickname} onChange={e => setNickname(e.target.value)}
                    onKeyDown={handleKeyNick} maxLength={12} />
                  <button className="puff-btn primary" onClick={handleStart}>시작 💗</button>
                </div>
              </div>
            )}
            <div className="intro-brand">⋆ B A M B A M I ⋆</div>
          </div>
        </div>
      );
    }

      // 첫 인사 말풍선 자동 숨김
      useEffect(() => {

        return () => clearTimeout(t);
      }, []);

      const hour     = now.getHours();
      const mood     = getTimeMood(hour);
      const theme    = MOOD_THEMES[mood];
      const baseExpr = (hour >= 0 && hour < 5) ? 'sleepy' : 'happy';

      // 날씨
      useEffect(() => {
        if (!navigator.geolocation) return;
        navigator.geolocation.getCurrentPosition(pos => {
          const { latitude: lat, longitude: lon } = pos.coords;
          fetch(`https://api.openweathermap.org/data/2.5/weather?lat=${lat}&lon=${lon}&appid=DEMO_KEY&lang=kr`)
            .then(r => r.json())
            .then(d => { if (d.weather) setWeather({ main: d.weather[0].main, desc: d.weather[0].description }); })
            .catch(() => {});
        }, () => {});
      }, []);

      const showBubble = (text, expressionType = null, holdMs = 5500) => {
        let finalText = text;
        if (Math.random() < 0.1 && !text.includes('냐앙') && !text.includes('골골'))
          finalText = text + [' 냐앙~', ' 골골골...'][Math.floor(Math.random() * 2)];

        h = h % 12; if (h === 0) h = 12;
        return `${ampm} ${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}`;

        const prev = bond;
        const next = prev + n;
        const prevStage = getBondStage(prev);
        const nextStage = getBondStage(next);
        setBond(next);
        LS.set('bambami_bond', next);
        if (prevStage.name !== nextStage.name) {
          // 단계 상승!
          setTimeout(() => {
            setBubble(`${nextStage.emoji} 우리, 이제 ${nextStage.name}이야!\n${nextStage.desc}`);
            setBubbleVisible(true);
            setExpression('joy');
            if (bubbleTimer.current) clearTimeout(bubbleTimer.current);
            bubbleTimer.current = setTimeout(() => setBubbleVisible(false), 6500);
          }, 800);
        }
      }, [bond]);

      // 추억 핀 (감정 키워드 매칭됐을 때 자동 저장)
      const pinMemory = useCallback((userText, replyText) => {
        const today = new Date().toLocaleDateString('ko-KR');
        const newMem = { date: today, user: userText, reply: replyText, ts: Date.now() };
        const updated = [newMem, ...memories].slice(0, 20);
        setMemories(updated);
        LS.set('bambami_memories', updated);
      }, [memories]);

      // 메모 추가/완료
      const addMemo = (text) => {
        const newMemo = { id: Date.now(), text, date: new Date().toLocaleDateString('ko-KR'), done: false };
        const updated = [newMemo, ...memos];
        setMemos(updated);
        LS.set('bambami_memos', updated);
      };
      const toggleMemo = (id) => {
        const updated = memos.map(m => m.id === id ? { ...m, done: !m.done } : m);
        setMemos(updated);
        LS.set('bambami_memos', updated);
      };
      const deleteMemo = (id) => {
        const updated = memos.filter(m => m.id !== id);
        setMemos(updated);
        LS.set('bambami_memos', updated);
      };

      // 기분 기록
      const logMood = (moodId) => {
        const today = new Date().toLocaleDateString('ko-KR');
        const filtered = moodLog.filter(m => m.date !== today);
        const updated = [{ date: today, mood: moodId, ts: Date.now() }, ...filtered].slice(0, 60);
        setMoodLog(updated);
        LS.set('bambami_moods', updated);
        bumpBond(1);
      };

      // 메모 알림: 어제 등록한 미완료 메모 있으면 인트로 후 안내
      useEffect(() => {
        if (nickname === null) return;
        const today = new Date().toLocaleDateString('ko-KR');
        const yesterday = new Date(Date.now() - 86400000).toLocaleDateString('ko-KR');
        const pendingFromYesterday = memos.filter(m => !m.done && m.date === yesterday);
        if (pendingFromYesterday.length > 0) {
          const memoText = pendingFromYesterday[0].text;
          setTimeout(() => {
            showBubble(`아 맞다! 어제 "${memoText.slice(0, 14)}${memoText.length > 14 ? '..' : ''}" 한다고 했었어`, 'joy', 6500);
          }, 12000);
        }
      }, [nickname]);

      const emotionToExpr = em => ({
        sad: 'sad', anxious: 'sad', happy: 'joy', love: 'joy',
        tired: 'sleepy', angry: 'sad', pet: 'wink',
      }[em] || 'joy');

      const handleSendMessage = () => {
        const trimmed = inputText.trim();
        if (!trimmed) return;
        setUserMessage(trimmed);
        setInputText('');
        setChatMode(false);
        setIsThinking(true);
        setBubbleVisible(false);
        addHeart();
        bumpBond(1);
        if (userMsgTimer.current) clearTimeout(userMsgTimer.current);
        userMsgTimer.current = setTimeout(() => setUserMessage(null), 6500);
        setTimeout(() => {
          setIsThinking(false);
          const em = findEmotionReply(trimmed, nickname);
          if (em) {
            showBubble(em.reply, emotionToExpr(em.emotion));
            // 감정 키워드가 매칭된 대화는 자동 추억 저장
            if (['sad','happy','love','anxious'].includes(em.emotion)) {
              pinMemory(trimmed, em.reply);
            }
            return;
          }
          let pool = TALK_LINES.map((_, i) => i).filter(i => !usedTalkIdx.includes(i));
          let newUsed = usedTalkIdx;
          if (pool.length === 0) { pool = TALK_LINES.map((_, i) => i); newUsed = []; }
          const idx = pool[Math.floor(Math.random() * pool.length)];
          setUsedTalkIdx([...newUsed, idx]);
          showBubble(TALK_LINES[idx], 'joy');
        }, 1100);
      };

      const handleTalk = () => {
        setPressed('talk'); setTimeout(() => setPressed(null), 150);
        setChatMode(true); setBubbleVisible(false);
      };
      const handleListen = () => {
        setPressed('listen'); setTimeout(() => setPressed(null), 150);
        let pool = LISTEN_LINES.map((_, i) => i).filter(i => !usedListenIdx.includes(i));
        let newUsed = usedListenIdx;
        if (pool.length === 0) { pool = LISTEN_LINES.map((_, i) => i); newUsed = []; }
        const idx = pool[Math.floor(Math.random() * pool.length)];
        setUsedListenIdx([...newUsed, idx]);
        showBubble(LISTEN_LINES[idx], 'joy');
      };
      const handleKeyDown = e => {
        if (e.key === 'Enter') { e.preventDefault(); handleSendMessage(); }
        else if (e.key === 'Escape') { setChatMode(false); setInputText(''); }
      };

      // ─── 캐릭터 클릭(쓰다듬기) 상호작용 ───
      const handlePet = () => {
        // 살짝 통통 튀는 애니메이션
        setPetBounce(true);
        if (petAnimTimer.current) clearTimeout(petAnimTimer.current);
        petAnimTimer.current = setTimeout(() => setPetBounce(false), 420);

        // 표정 → wink
        setExpression('wink');
        if (expressionTimer.current) clearTimeout(expressionTimer.current);
        expressionTimer.current = setTimeout(() => setExpression(baseExpr), 1800);

        // 카운터 증가 + 일정 시간 지나면 리셋
        const newCount = petCount + 1;
        setPetCount(newCount);
        if (petResetTimer.current) clearTimeout(petResetTimer.current);
        petResetTimer.current = setTimeout(() => setPetCount(0), 2500);

        // 5번 이상 빠르게 누르면 연타 대사
        let line;
        if (newCount >= 5) {
          line = SPAM_PET_LINES[Math.floor(Math.random() * SPAM_PET_LINES.length)];
        } else {
          let pool = PET_LINES.map((_, i) => i).filter(i => !usedPetIdx.includes(i));
          let newUsed = usedPetIdx;
          if (pool.length === 0) { pool = PET_LINES.map((_, i) => i); newUsed = []; }
          const idx = pool[Math.floor(Math.random() * pool.length)];
          setUsedPetIdx([...newUsed, idx]);
          line = PET_LINES[idx];
        }

        setBubble(line);
        setBubbleVisible(true);
        if (bubbleTimer.current) clearTimeout(bubbleTimer.current);
        bubbleTimer.current = setTimeout(() => setBubbleVisible(false), 3500);

        addHeart();
        // 쓰다듬기는 3번당 친밀도 +1 (남발 방지)
        if ((newCount - 1) % 3 === 0) bumpBond(1);
      };

      useEffect(() => {
        if (chatMode && inputRef.current) inputRef.current.focus();
      }, [chatMode]);

      const currentExpr = ['joy', 'sad', 'angry', 'sleepy', 'wink'].includes(expression) && expression !== 'happy'
        ? expression
        : baseExpr;

      // 인트로
      if (nickname === null) return <IntroScreen onComplete={handleIntroComplete} />;

      // 메인
      return (
        <div className="main-shell">
          {/* 떠오르는 하트 */}
          {floatingHeart && (
            <div className="floating-heart" style={{ left: `calc(50% - 180px + ${floatingHeart.x}%)`, bottom: '180px' }}>💗</div>
          )}

          <div className="device-frame">
            {/* 상단 정보바 */}
            <div className="info-bar">
              <div className="streak-badge">
                <span style={{ fontSize: '12px' }}>🔥</span>
                <span>{streak}일</span>
              </div>
              <button className="bond-chip" onClick={() => setShowBond(true)} aria-label="우리 사이">
                <span style={{ fontSize: '13px' }}>{getBondStage(bond).emoji}</span>
                <span className="bond-chip-name">{getBondStage(bond).name}</span>
              </button>
              <HeartGauge count={heartCount} />
              {weather && (
                <div className="weather-chip">{
                  weather.main === 'Rain' ? '🌧'
                  : weather.main === 'Snow' ? '❄️'
                  : weather.main === 'Clear' ? '☀️'
                  : weather.main === 'Clouds' ? '☁️'
                  : '🌤'
                }</div>
              )}
            </div>

            {/* 화면 */}
            <div className="screen" style={{ background: theme.bg }}>
              <div className="clock-bar">
                <span className="brand-name">· 뱀뱀이 ·</span>
                <span className="clock-time">{formatTime(now)}</span>
                <span className="clock-mood">{theme.label}</span>
              </div>

              <div className="stage">
                {theme.showStars && <Stars />}
                <CityBackground opacity={theme.cityOpacity} showMoon={theme.showMoon} />

                <div className="message-area">
                  {userMessage && (
                    <div className="bubble-row right">
                      <div className="speech-bubble user" key={userMessage}>{userMessage}</div>
                    </div>
                  )}
                  {isThinking && (
                    <div className="bubble-row left">
                      <div className="speech-bubble bambami thinking-bubble"><span /><span /><span /></div>
                    </div>
                  )}
                  {bubbleVisible && !isThinking && (
                    <div className="bubble-row left">
                      <div className="speech-bubble bambami" key={bubble}>{bubble}</div>
                    </div>
                  )}
                </div>

                <div className={`character-float ${petBounce ? 'pet-bounce' : ''}`}>
                  <BambamiCharacter expression={currentExpr} onPet={handlePet} isPetting={petBounce} />
                </div>
              </div>
            </div>

            {/* 컨트롤 */}
            <div className="controls">
              {chatMode ? (
                <React.Fragment>
                  <div className="chat-input-area">
                    <input ref={inputRef} className="chat-input" type="text" value={inputText}
                      onChange={e => setInputText(e.target.value)} onKeyDown={handleKeyDown}
                      placeholder="뱀뱀이에게 말 걸기..." maxLength={60} />
                    <button className="puff-btn send" onClick={handleSendMessage} disabled={!inputText.trim()}>전송</button>
                    <button className="puff-btn icon" onClick={() => { setChatMode(false); setInputText(''); }} aria-label="취소">✕</button>
                  </div>
                  <div className="input-hint">Enter로 전송 · Esc로 취소</div>
                </React.Fragment>
              ) : (
                <div className="button-row">
                  <button className={`puff-btn primary ${pressed === 'talk' ? 'pressed' : ''}`} onClick={handleTalk}>말걸기</button>
                  <button className={`puff-btn primary ${pressed === 'listen' ? 'pressed' : ''}`} onClick={handleListen}>듣기</button>
                  <button className="puff-btn icon-large" onClick={() => setShowMenu(true)} aria-label="메뉴">☰</button>
                </div>
              )}
            </div>

            <div className="brand-footer">⋆ B A M B A M I ⋆</div>
          </div>

          {showMenu && (
            <MenuPanel
              dailyLine={getDailyLine()}
              isLateNight={hour >= 23 || hour < 4}
              hasMemoYesterday={memos.some(m => !m.done && m.date === new Date(Date.now() - 86400000).toLocaleDateString('ko-KR'))}
              onSelect={(id) => {
                setShowMenu(false);
                if (id === 'bond')      setShowBond(true);
                if (id === 'mood')      setShowMood(true);
                if (id === 'breath')    setShowBreathing(true);
                if (id === 'memo')      setShowMemo(true);
                if (id === 'memories')  setShowMemories(true);
                if (id === 'diary')     setShowDiary(true);
                if (id === 'sounds')    setShowSounds(true);
              }}
              onClose={() => setShowMenu(false)}
            />
          )}
          {showBond && <BondModal bond={bond} streak={streak} heartCount={heartCount} onClose={() => setShowBond(false)} />}
          {showMood && <MoodModal moodLog={moodLog} onLog={(id) => { logMood(id); }} onClose={() => setShowMood(false)} />}
          {showBreathing && <BreathingModal onComplete={() => bumpBond(2)} onClose={() => setShowBreathing(false)} />}
          {showMemo && <MemoModal memos={memos} onAdd={(t) => { addMemo(t); bumpBond(1); }} onToggle={toggleMemo} onDelete={deleteMemo} onClose={() => setShowMemo(false)} />}
          {showMemories && <MemoriesModal memories={memories} onClose={() => setShowMemories(false)} />}
          {showSounds && <SoundsModal onClose={() => setShowSounds(false)} />}
          {showDiary && <DiaryModal nickname={nickname} onClose={() => setShowDiary(false)} />}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<Bambami />);
  </script>
</body>
</html>
