    const { useState, useEffect, useRef, useCallback } = React;

    // ─── 로컬스토리지 헬퍼 ───────────────────────────────────────
    const LS = {
      get: (k, def) => { try { const v = localStorage.getItem(k); return v !== null ? JSON.parse(v) : def; } catch { return def; } },
      set: (k, v) => { try { localStorage.setItem(k, JSON.stringify(v)); } catch {} },
    };

    // ─── 시간대 계산 ─────────────────────────────────────────────
    function getTimeMood(hour) {
      if (hour >= 0 && hour < 5)  return 'midnight';
      if (hour >= 5 && hour < 10) return 'dawn';
      if (hour >= 10 && hour < 17) return 'day';
      if (hour >= 17 && hour < 21) return 'sunset';
      return 'night';
    }
    function getTimeLabel(hour) {
      if (hour >= 0 && hour < 5)  return { ampm: 'AM', label: '깊은 새벽' };
      if (hour >= 5 && hour < 7)  return { ampm: 'AM', label: '이른 아침' };
      if (hour >= 7 && hour < 12) return { ampm: 'AM', label: '아침' };
      if (hour >= 12 && hour < 14) return { ampm: 'PM', label: '점심' };
      if (hour >= 14 && hour < 17) return { ampm: 'PM', label: '오후' };
      if (hour >= 17 && hour < 20) return { ampm: 'PM', label: '해질녘' };
      return { ampm: 'PM', label: '저녁' };
    }

    // ─── 시간대별 인트로 마지막 대사 ────────────────────────────
    function getTimeIntroLine(hour) {
      if (hour >= 0 && hour < 5)
        return `AM ${String(hour).padStart(2,'0')}:${String(new Date().getMinutes()).padStart(2,'0')}.\n잠들지 못하는 깊은 새벽에도,\n나는 여기서 항상 널 기다리고 있을게.`;
      if (hour >= 5 && hour < 8)
        return `이른 아침부터 일어났구나.\n새벽 공기처럼 상쾌한 하루가\n될 거야, 분명히.`;
      if (hour >= 8 && hour < 12)
        return `${hour}시의 햇살처럼 따뜻하게,\n오늘 하루도 네 곁에\n있어줄게.`;
      if (hour >= 12 && hour < 14)
        return `점심 시간에 나를 찾아줬구나.\n밥은 먹었어? 오늘도\n같이 있어줄게.`;
      if (hour >= 14 && hour < 17)
        return `나른한 오후에 와줘서 기뻐.\n잠깐 쉬어가도 괜찮아,\n여기 있을게.`;
      if (hour >= 17 && hour < 20)
        return `해가 지는 시간에 와줬네.\n오늘 하루 수고 많았어,\n천천히 쉬어가자.`;
      return `밤이 깊어지고 있어.\n오늘 하루 잘 버텼어,\n나랑 같이 쉬어가자.`;
    }

    // ─── 인트로 대사 ─────────────────────────────────────────────
    function getIntroLines(hour) {

    function findEmotionReply(text, nickname) {
      if (text.includes('네 이름') || text.includes('너 이름') || text.includes('뱀뱀이 이름'))
        return { emotion: 'greeting', reply: '나는 뱀뱀이야! 💗 기억해줘!' };
      if ((text.includes('내 이름') || text.includes('나 이름') || text.includes('내이름')) && nickname && nickname !== '너')
        return { emotion: 'love', reply: `나의 소중한 친구 ${nickname}! 이름 기억하고 있어 💗` };
      if (nickname && nickname !== '너' && text.includes(nickname))
        return { emotion: 'love', reply: `${nickname}아, 불렀어? 나 여기 있어! 💗` };
      for (const [emotion, data] of Object.entries(EMOTION_RESPONSES)) {
        for (const keyword of data.keywords) {
          if (text.includes(keyword))
            return { emotion, reply: data.replies[Math.floor(Math.random() * data.replies.length)] };
        }
      }
      return null;
    }

    // ─── 연속 방문 배지 ──────────────────────────────────────────
    function calcStreak() {
      const today = new Date().toDateString();
      const last  = LS.get('bambami_last_date', null);
      const streak = LS.get('bambami_streak', 0);
      if (last === today) return streak;
      const yesterday = new Date(Date.now() - 86400000).toDateString();
      const newStreak = last === yesterday ? streak + 1 : 1;
      LS.set('bambami_last_date', today);
      LS.set('bambami_streak', newStreak);
      return newStreak;
    }

    // ─── 감정 게이지 ─────────────────────────────────────────────
    function HeartGauge({ count }) {
      const maxHearts = 5;
      const filled = Math.min(count, maxHearts * 2);
      const fullHearts = Math.floor(filled / 2);
      const halfHeart = filled % 2 === 1;
      return (
        <div style={{ display:'flex', gap:'2px', alignItems:'center' }}>
          {Array.from({ length: maxHearts }).map((_, i) => (
            <span key={i} style={{ fontSize:'11px', opacity: i < fullHearts ? 1 : halfHeart && i === fullHearts ? 0.5 : 0.2 }}>💗</span>
          ))}
        </div>
      );
    }

    function Stars() {
      const stars = Array.from({ length: 14 }, () => ({
        x: Math.random() * 100, y: Math.random() * 45,
        delay: Math.random() * 3, size: Math.random() * 1 + 0.5,
      }));
      return (
        <React.Fragment>
          {stars.map((s, i) => (
            <div key={i} style={{
              position:'absolute', left:`${s.x}%`, top:`${s.y}%`,
              width:`${s.size * 2}px`, height:`${s.size * 2}px`,
              background:'#5a5a5a', borderRadius:'50%',
              animation:`twinkle 2.5s ease-in-out ${s.delay}s infinite`,
              pointerEvents:'none',
            }} />
          ))}
        </React.Fragment>
      );
    }

    // ─── 뱀뱀이 메인 SVG ─────────────────────────────────────────
    function BambamiSVG({ expression }) {
      const isSleepy = expression === 'sleepy';
      const isSad    = expression === 'sad';
      const isJoy    = expression === 'joy';
      const isAngry  = expression === 'angry';
      const ink = '#3a3a3a';
      const fillSoft = '#fefefe';
      const renderEye = (cx, cy) => {
        if (isSleepy) return <path d={`M ${cx-7} ${cy} Q ${cx} ${cy+3} ${cx+7} ${cy}`} stroke={ink} strokeWidth="2.2" strokeLinecap="round" fill="none" />;
        if (isJoy)    return <path d={`M ${cx-7} ${cy+1} Q ${cx} ${cy-5} ${cx+7} ${cy+1}`} stroke={ink} strokeWidth="2.4" strokeLinecap="round" fill="none" />;

    // ─── 인트로 화면 ─────────────────────────────────────────────
    function IntroScreen({ onComplete }) {
      const hour = new Date().getHours();
      const INTRO_LINES = getIntroLines(hour);
      const [lineIndex, setLineIndex] = useState(-1);
      const [displayedText, setDisplayedText] = useState('');
      const [isTyping, setIsTyping] = useState(false);
      const [showNickname, setShowNickname] = useState(false);
      const [nickname, setNickname] = useState('');
      const [approached, setApproached] = useState(false);
      const [cloudPhase, setCloudPhase] = useState(0);
      const nicknameRef = useRef(null);
      const typingRef   = useRef(null);

      useEffect(() => {
        const t1 = setTimeout(() => setCloudPhase(1), 400);
        const t2 = setTimeout(() => setApproached(true), 1200);
        const t3 = setTimeout(() => setLineIndex(0), 2000);
        return () => { clearTimeout(t1); clearTimeout(t2); clearTimeout(t3); };
      }, []);

      useEffect(() => {
        if (lineIndex < 0 || lineIndex >= INTRO_LINES.length) return;
        setIsTyping(true);
        setDisplayedText('');
        const full = INTRO_LINES[lineIndex];
        let i = 0;
        if (typingRef.current) clearInterval(typingRef.current);
        typingRef.current = setInterval(() => {
          i++;
          setDisplayedText(full.slice(0, i));
          if (i >= full.length) { clearInterval(typingRef.current); setIsTyping(false); }
        }, 36);
        return () => clearInterval(typingRef.current);
      }, [lineIndex]);

      const handleNext = () => {
        if (isTyping) {
          clearInterval(typingRef.current);
          setDisplayedText(INTRO_LINES[lineIndex]);
          setIsTyping(false);
          return;
        }
        if (lineIndex < INTRO_LINES.length - 1) {
          setLineIndex(p => p + 1);
        } else {
          setShowNickname(true);
          setTimeout(() => nicknameRef.current && nicknameRef.current.focus(), 100);
        }
      };

      const handleStart = () => onComplete(nickname.trim() || '너');
      const handleKeyNick = e => { if (e.key === 'Enter') handleStart(); };
      const isLastLine = lineIndex === INTRO_LINES.length - 1 && !isTyping;

      return (
        <div style={{
          minHeight:'100vh', display:'flex', alignItems:'center', justifyContent:'center',
          background:'#f4f3f1', padding:'20px', fontFamily:'"Gaegu", cursive', overflow:'hidden',

            @keyframes cloudDrift {

              100% { transform: translateX(0) translateY(0) scale(1); opacity: 1; }
            }
            @keyframes floatIntro {
              0%,100% { transform: translateY(0) rotate(-0.5deg); }
              50%      { transform: translateY(-6px) rotate(0.5deg); }
            }
            @keyframes introBubblePop {
              0%   { transform: scale(0.85); opacity: 0; }
              60%  { transform: scale(1.02); opacity: 1; }
              100% { transform: scale(1);    opacity: 1; }
            }
            @keyframes nickFade {
              from { opacity: 0; transform: translateY(8px); }
              to   { opacity: 1; transform: translateY(0); }
            }
            .intro-character {
              animation: ${approached ? 'floatIntro 4s ease-in-out infinite' : 'cloudDrift 0.9s cubic-bezier(0.22,1,0.36,1) forwards'};
              opacity: ${cloudPhase >= 1 ? 1 : 0};
              margin-bottom: -4px;
            }
            .intro-box {
              width: 320px; max-width: 100%; background: #fdfcfa;
              border: 1.5px solid #2a2a2a; border-radius: 16px;
              padding: 16px 18px 13px; position: relative;
              box-shadow: 2px 3px 0 #2a2a2a; cursor: pointer; min-height: 86px;
              animation: introBubblePop 0.35s cubic-bezier(0.34,1.56,0.64,1) forwards;
            }
            .intro-box::before {
              content:''; position:absolute; top:-12px; left:50%; transform:translateX(-50%);
              border:10px solid transparent; border-bottom:13px solid #2a2a2a;
            }
            .intro-box::after {
              content:''; position:absolute; top:-9px; left:50%; transform:translateX(-50%);
              border:8px solid transparent; border-bottom:11px solid #fdfcfa; z-index:1;
            }
            .intro-text {
              font-family:'Gaegu',cursive; font-size:15px; font-weight:700;
              color:#2a2a2a; line-height:1.65; white-space:pre-line; min-height:46px;
            }
            .intro-progress { display:flex; align-items:center; justify-content:space-between; margin-top:10px; }
            .intro-dots { display:flex; gap:5px; }
            .intro-dot { width:6px; height:6px; border-radius:50%; background:#ddd; transition:background 0.3s; }
            .intro-dot.active { background:#e8a0b4; }
            .intro-dot.done   { background:#c8c8c8; }
            .intro-next-btn {
              font-family:'Nanum Pen Script',cursive; font-size:20px;
              padding:5px 14px; background:#2a2a2a; color:#fdfcfa;
              border:none; border-radius:10px; cursor:pointer;
              box-shadow:2px 2px 0 #5a5a5a; transition:all 0.1s;
            }
            .intro-next-btn:hover  { background:#3a3a3a; }
            .intro-next-btn:active { transform:translate(2px,2px); box-shadow:none; }
            .nick-section {
              width:320px; max-width:100%; margin-top:14px;
              animation:nickFade 0.5s ease forwards;
              display:flex; flex-direction:column; gap:10px;
            }
            .nick-label { font-family:'Nanum Pen Script',cursive; font-size:20px; color:#2a2a2a; text-align:center; opacity:0.8; }
            .nick-row   { display:flex; gap:8px; }
            .nick-input {
              flex:1; font-family:'Gaegu',cursive; font-size:15px; font-weight:700;
              padding:9px 12px; background:#fdfcfa; border:1.5px solid #2a2a2a;
              border-radius:12px; color:#2a2a2a; outline:none; box-shadow:2px 3px 0 #2a2a2a;

              padding:8px 16px; background:#2a2a2a; color:#fdfcfa;
              border:1.5px solid #2a2a2a; border-radius:12px;
              cursor:pointer; box-shadow:2px 3px 0 #5a5a5a; white-space:nowrap; transition:all 0.12s;
            }
            .nick-btn:hover  { background:#3a3a3a; }
            .nick-btn:active { transform:translate(2px,3px); box-shadow:none; }
            .intro-brand { margin-top:18px; font-family:'Nanum Pen Script',cursive; font-size:14px; letter-spacing:3px; color:#2a2a2a; opacity:0.35; text-align:center; }
          `}</style>

          <div style={{ display:'flex', flexDirection:'column', alignItems:'center' }}>
            <div className="intro-character"><CloudBambamiSVG /></div>

            {lineIndex >= 0 && (
              <div className="intro-box" onClick={handleNext} key={lineIndex}>
                <div className="intro-text">
                  {displayedText}
                  {isTyping && <span style={{ opacity:0.4 }}>▍</span>}
                </div>
                <div className="intro-progress">
                  <div className="intro-dots">
                    {INTRO_LINES.map((_, i) => (
                      <div key={i} className={`intro-dot ${i === lineIndex ? 'active' : i < lineIndex ? 'done' : ''}`} />
                    ))}
                  </div>
                  {!isTyping && (
                    <button className="intro-next-btn" onClick={e => { e.stopPropagation(); handleNext(); }}>
                      {isLastLine ? '💗' : '다음 ▸'}
                    </button>
                  )}
                </div>
              </div>
            )}

            {showNickname && (
              <div className="nick-section">
                <div className="nick-label">✦ 너의 이름을 알려줄래? ✦</div>
                <div className="nick-row">
                  <input ref={nicknameRef} className="nick-input" type="text"
                    placeholder="닉네임 (없어도 괜찮아)"
                    value={nickname} onChange={e => setNickname(e.target.value)}

        </div>

    // ─── 메인 컴포넌트 ────────────────────────────────────────────
    function Bambami() {
      // ── 퍼시스턴트 상태 ──
      const [nickname, setNickname]   = useState(null);  // null = 인트로
      const [streak,   setStreak]     = useState(0);
      const [heartCount, setHeartCount] = useState(() => LS.get('bambami_hearts', 0));
      const [lastDiaryMood, setLastDiaryMood] = useState(() => {
        const entries = LS.get('bambami_diary', []);
        if (entries.length > 1) return entries[1]; // 전번 방문 기록
        return null;
      });

      // ── UI 상태 ──
      const [now,          setNow]          = useState(new Date());
      const [bubble,       setBubble]       = useState('기다렸어! 보고 싶었어');
      const [bubbleVisible,setBubbleVisible]= useState(true);
      const [expression,   setExpression]   = useState('happy');
      const [usedTalkIdx,  setUsedTalkIdx]  = useState([]);
      const [usedListenIdx,setUsedListenIdx]= useState([]);
      const [pressed,      setPressed]      = useState(null);
      const [chatMode,     setChatMode]     = useState(false);
      const [inputText,    setInputText]    = useState('');
      const [userMessage,  setUserMessage]  = useState(null);
      const [isThinking,   setIsThinking]   = useState(false);
      const [weather,      setWeather]      = useState(null);   // {main, desc}
      const [showDiary,    setShowDiary]    = useState(false);
      const [floatingHeart,setFloatingHeart]= useState(null);  // {id, x}

      const bubbleTimer     = useRef(null);
      const expressionTimer = useRef(null);
      const userMsgTimer    = useRef(null);
      const inputRef        = useRef(null);
      const heartIdRef      = useRef(0);

      // ── 시계 ──
      useEffect(() => {
        const iv = setInterval(() => setNow(new Date()), 1000);
        return () => clearInterval(iv);
      }, []);

      // ── 최초 말풍선 숨기기 ──
      useEffect(() => {
        const t = setTimeout(() => setBubbleVisible(false), 3500);
        return () => clearTimeout(t);
      }, []);

      const hour        = now.getHours();
      const mood        = getTimeMood(hour);
      const theme       = MOOD_THEMES[mood];
      const baseExpr    = (hour >= 0 && hour < 5) ? 'sleepy' : 'happy';

      // ── 날씨 가져오기 ──
      useEffect(() => {
        if (!navigator.geolocation) return;
        navigator.geolocation.getCurrentPosition(pos => {
          const { latitude: lat, longitude: lon } = pos.coords;
          fetch(`https://api.openweathermap.org/data/2.5/weather?lat=${lat}&lon=${lon}&appid=DEMO_KEY&lang=kr`)
            .then(r => r.json())
            .then(d => { if (d.weather) setWeather({ main: d.weather[0].main, desc: d.weather[0].description }); })
            .catch(() => {});
        }, () => {});
      }, []);

      // ── 연속 방문 스트릭 (인트로 완료 후) ──
      const handleIntroComplete = (name) => {
        setNickname(name);
        const s = calcStreak();
        setStreak(s);

        // 전번 일기 기억
        const entries = LS.get('bambami_diary', []);
        const yesterday = new Date(Date.now()-86400000).toLocaleDateString('ko-KR');
        const prev = entries.find(e => e.date === yesterday);
        if (prev) setLastDiaryMood(prev);

        setTimeout(() => {
          // 인사 멘트
          let greeting = name !== '너' ? `${name}아, 드디어 왔구나! 💗 기다렸어~` : '드디어 왔구나! 💗 기다렸어~';

          // 연속 방문 추가 멘트
          if (s >= 3) greeting = `${s}일 연속! 또 와줬구나 💗 보고 싶었어`;
          if (s >= 7) greeting = `일주일 연속이야!! 나 너무 행복해 냐앙~`;

          // 전번 일기 기억 멘트
          if (prev && s > 1) {
            setTimeout(() => {
              showBubble(`저번에 "${prev.mood.slice(0,12)}..." 라고 했잖아. 지금은 어때?`, 'joy');
            }, 4500);
          }

          // 날씨 멘트
          if (weather) {
            const pool = WEATHER_BUBBLES[weather.main] || WEATHER_BUBBLES['Clouds'];
            setTimeout(() => showBubble(pool[Math.floor(Math.random()*pool.length)], 'joy'), 8000);
          }

          setBubble(greeting);
          setBubbleVisible(true);
        }, 600);
      };

      const formatTime = (d) => {
        let h = d.getHours();
        const m = d.getMinutes();
        const ampm = h >= 12 ? 'PM' : 'AM';
        h = h % 12; if (h === 0) h = 12;
        return `${ampm} ${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
      };

      const addHeart = useCallback(() => {
        const newCount = heartCount + 1;
        setHeartCount(newCount);
        LS.set('bambami_hearts', newCount);
        // 떠오르는 하트 이펙트
        const id = heartIdRef.current++;
        const x = 30 + Math.random() * 40;
        setFloatingHeart({ id, x });
        setTimeout(() => setFloatingHeart(null), 1200);
      }, [heartCount]);

      const showBubble = (text, expressionType = null) => {
        let finalText = text;
        if (Math.random() < 0.1 && !text.includes('냐앙') && !text.includes('골골'))
          finalText = text + [' 냐앙~', ' 골골골...'][Math.floor(Math.random()*2)];
        setBubble(finalText); setBubbleVisible(true);
        if (expressionType) {
          setExpression(expressionType);
          if (expressionTimer.current) clearTimeout(expressionTimer.current);
          expressionTimer.current = setTimeout(() => setExpression(baseExpr), 3000);
        }
        if (bubbleTimer.current) clearTimeout(bubbleTimer.current);
        bubbleTimer.current = setTimeout(() => setBubbleVisible(false), 5500);
      };

      const emotionToExpr = (em) => ({sad:'sad',anxious:'sad',happy:'joy',love:'joy',tired:'sleepy',angry:'angry'}[em] || 'joy');

      const handleSendMessage = () => {
        const trimmed = inputText.trim();
        if (!trimmed) return;
        setUserMessage(trimmed); setInputText(''); setChatMode(false);
        setIsThinking(true); setBubbleVisible(false); addHeart();
        if (userMsgTimer.current) clearTimeout(userMsgTimer.current);
        userMsgTimer.current = setTimeout(() => setUserMessage(null), 6000);
        setTimeout(() => {
          setIsThinking(false);
          const em = findEmotionReply(trimmed, nickname);
          if (em) { showBubble(em.reply, emotionToExpr(em.emotion)); return; }
          let pool = TALK_LINES.map((_,i)=>i).filter(i=>!usedTalkIdx.includes(i));
          let newUsed = usedTalkIdx;
          if (pool.length === 0) { pool = TALK_LINES.map((_,i)=>i); newUsed = []; }
          const idx = pool[Math.floor(Math.random()*pool.length)];
          setUsedTalkIdx([...newUsed, idx]);
          showBubble(TALK_LINES[idx], 'joy');
        }, 1100);
      };

      const handleTalk   = () => { setPressed('talk');   setTimeout(()=>setPressed(null),150); setChatMode(true);  setBubbleVisible(false); };
      const handleListen = () => {
        setPressed('listen'); setTimeout(()=>setPressed(null),150);
        let pool = LISTEN_LINES.map((_,i)=>i).filter(i=>!usedListenIdx.includes(i));
        let newUsed = usedListenIdx;
        if (pool.length===0) { pool=LISTEN_LINES.map((_,i)=>i); newUsed=[]; }
        const idx = pool[Math.floor(Math.random()*pool.length)];
        setUsedListenIdx([...newUsed,idx]);
        showBubble(LISTEN_LINES[idx], 'joy');
      };
      const handleKeyDown = e => {
        if (e.key==='Enter') { e.preventDefault(); handleSendMessage(); }
        else if (e.key==='Escape') { setChatMode(false); setInputText(''); }
      };

      useEffect(() => { if (chatMode && inputRef.current) inputRef.current.focus(); }, [chatMode]);

      const currentExpr = ['joy','sad','angry','sleepy'].includes(expression) && expression !== 'happy' ? expression : baseExpr;

      // ── 인트로 ──
      if (nickname === null) return <IntroScreen onComplete={handleIntroComplete} />;

      // ── 메인 렌더 ──
      return (
        <div style={{
          minHeight:'100vh', display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center',
          background:'#f4f3f1', padding:'20px', fontFamily:'"Gaegu","Courier New",monospace',
          position:'relative',
        }}>
          <style>{`
            @import url('https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&family=Nanum+Pen+Script&display=swap');
            * { box-sizing:border-box; }
            @keyframes twinkle     { 0%,100%{ opacity:0.3; } 50%{ opacity:0.9; } }
            @keyframes float       { 0%,100%{ transform:translateY(0) rotate(-0.5deg); } 50%{ transform:translateY(-3px) rotate(0.5deg); } }
            @keyframes bubblePop   { 0%{ transform:scale(0.6) translateY(6px); opacity:0; } 60%{ transform:scale(1.03); opacity:1; } 100%{ transform:scale(1) translateY(0); opacity:1; } }
            @keyframes thinkingDots{ 0%,20%{ opacity:0.2; } 50%{ opacity:1; } 80%,100%{ opacity:0.2; } }
            @keyframes heartFloat  { 0%{ transform:translateY(0) scale(1); opacity:1; } 100%{ transform:translateY(-50px) scale(1.4); opacity:0; } }
            @keyframes streakPop   { 0%{ transform:scale(0.7); opacity:0; } 60%{ transform:scale(1.1); opacity:1; } 100%{ transform:scale(1); opacity:1; } }
            .gameboy-frame {
              background:#fdfcfa; border:2px solid #2a2a2a; border-radius:28px 28px 44px 44px;
              padding:20px 18px 26px; width:360px; max-width:100%; position:relative;
              box-shadow:0 6px 0 #2a2a2a, 0 8px 0 1px #2a2a2a, 8px 14px 0 -2px rgba(0,0,0,0.08);
            }
            .gameboy-frame::after {
              content:''; position:absolute; inset:0; border-radius:28px 28px 44px 44px;
              background-image:radial-gradient(circle at 20% 30%, rgba(0,0,0,0.015) 1px, transparent 1px),
                               radial-gradient(circle at 70% 60%, rgba(0,0,0,0.02) 1px, transparent 1px);
              background-size:8px 8px,12px 12px; pointer-events:none; mix-blend-mode:multiply;
            }
            .gameboy-frame::before {
              content:''; position:absolute; top:7px; left:50%; transform:translateX(-50%);
              width:36px; height:3px; background:#2a2a2a; border-radius:2px; opacity:0.4;
            }
            .screen { border:1.5px solid #2a2a2a; border-radius:14px 14px 18px 18px; padding:0; position:relative; overflow:hidden; transition:background 1.5s ease; height:420px; display:flex; flex-direction:column; }
            .clock-bar { display:flex; justify-content:space-between; align-items:center; padding:6px 12px; border-bottom:1px dashed #2a2a2a; font-family:'Nanum Pen Script',cursive; color:#2a2a2a; font-size:18px; background:rgba(255,255,255,0.5); backdrop-filter:blur(2px); z-index:3; flex-shrink:0; }
            .clock-time { font-variant-numeric:tabular-nums; font-weight:700; }
            .clock-mood { font-size:14px; opacity:0.6; }
            .stage { flex:1; position:relative; overflow:hidden; display:flex; align-items:flex-end; justify-content:center; padding-bottom:12px; }
            .message-area { position:absolute; top:8px; left:12px; right:12px; z-index:2; display:flex; flex-direction:column; gap:6px; pointer-events:none; }
            .bubble-row { display:flex; width:100%; }
            .bubble-row.left  { justify-content:flex-start; }
            .bubble-row.right { justify-content:flex-end; }
            .speech-bubble { background:#fdfcfa; border:1.5px solid #2a2a2a; color:#2a2a2a; padding:8px 14px; border-radius:16px; font-family:'Gaegu',sans-serif; font-size:15px; font-weight:700; line-height:1.35; max-width:78%; word-break:keep-all; overflow-wrap:break-word; position:relative; box-shadow:2px 2px 0 #2a2a2a; animation:bubblePop 0.4s cubic-bezier(0.34,1.56,0.64,1) forwards; }
            .speech-bubble.bambami { border-bottom-left-radius:4px; }
            .speech-bubble.bambami::after  { content:''; position:absolute; left:12px; bottom:-7px; border:6px solid transparent; border-top:8px solid #2a2a2a; }
            .speech-bubble.bambami::before { content:''; position:absolute; left:13px; bottom:-5px; border:5px solid transparent; border-top:7px solid #fdfcfa; z-index:1; }
            .speech-bubble.user { background:#2a2a2a; color:#fdfcfa; border-color:#2a2a2a; border-bottom-right-radius:4px; box-shadow:2px 2px 0 #5a5a5a; }
            .speech-bubble.user::after { content:''; position:absolute; right:12px; bottom:-7px; border:6px solid transparent; border-top:8px solid #2a2a2a; }
            .thinking-bubble { display:flex; gap:4px; padding:12px 16px; }
            .thinking-bubble span { width:5px; height:5px; background:#2a2a2a; border-radius:50%; animation:thinkingDots 1.4s ease-in-out infinite; }
            .thinking-bubble span:nth-child(2){ animation-delay:0.2s; }
            .thinking-bubble span:nth-child(3){ animation-delay:0.4s; }
            .character-float { animation:float 4s ease-in-out infinite; z-index:1; }
            .controls { margin-top:14px; padding:0 4px; }
            .button-row { display:flex; gap:8px; }
            .pixel-btn { flex:1; font-family:'Nanum Pen Script',cursive; font-size:21px; padding:10px 6px; background:#fdfcfa; border:1.5px solid #2a2a2a; cursor:pointer; border-radius:12px; letter-spacing:1px; color:#2a2a2a; transition:all 0.12s ease; box-shadow:2px 3px 0 #2a2a2a; }
            .pixel-btn:hover  { background:#f4f3f1; }
            .pixel-btn:active,.pixel-btn.pressed { transform:translate(2px,3px); box-shadow:0 0 0 #2a2a2a; }
            .pixel-btn.diary  { flex:0.7; font-size:18px; }
            .chat-input-area { display:flex; gap:8px; align-items:stretch; }
            .chat-input { flex:1; min-width:0; font-family:'Gaegu',sans-serif; font-size:15px; padding:9px 12px; background:#fdfcfa; border:1.5px solid #2a2a2a; border-radius:12px; color:#2a2a2a; outline:none; box-shadow:2px 3px 0 #2a2a2a; }
            .chat-input::placeholder { color:#aaa; }
            .chat-input:focus { background:#fff; }
            .send-btn { font-family:'Nanum Pen Script',cursive; font-size:20px; padding:8px 14px; background:#2a2a2a; color:#fdfcfa; border:1.5px solid #2a2a2a; border-radius:12px; cursor:pointer; box-shadow:2px 3px 0 #5a5a5a; transition:all 0.12s; white-space:nowrap; }
            .send-btn:hover  { background:#3a3a3a; }
            .send-btn:active { transform:translate(2px,3px); box-shadow:none; }
            .cancel-btn { font-family:'Gaegu',sans-serif; font-size:18px; padding:8px 10px; background:transparent; color:#2a2a2a; border:1.5px solid transparent; border-radius:12px; cursor:pointer; }
            .cancel-btn:hover { opacity:0.6; }
            .brand-label { margin-top:14px; text-align:center; font-family:'Nanum Pen Script',cursive; font-size:14px; letter-spacing:3px; color:#2a2a2a; opacity:0.5; }
            .input-hint { font-family:'Gaegu',sans-serif; font-size:11px; color:#888; text-align:center; margin-top:6px; }
            .info-bar { display:flex; justify-content:space-between; align-items:center; padding:0 2px; margin-bottom:8px; }
            .streak-badge { font-family:'Gaegu',cursive; font-size:12px; color:#888; display:flex; align-items:center; gap:3px; animation:streakPop 0.4s ease; }
            .weather-chip { font-family:'Gaegu',cursive; font-size:12px; color:#aaa; }
            .floating-heart { position:absolute; pointer-events:none; font-size:18px; animation:heartFloat 1.2s ease-out forwards; z-index:10; }
          `}</style>

          {/* 떠오르는 하트 이펙트 */}
          {floatingHeart && (
            <div className="floating-heart" style={{ left:`calc(50% - 180px + ${floatingHeart.x}%)`, bottom:'120px' }}>💗</div>
          )}

          <div className="gameboy-frame">
            {/* 상단 정보바 (스트릭 + 감정 게이지) */}
            <div className="info-bar">
              <div className="streak-badge">
                🔥 {streak}일 연속
              </div>
              <HeartGauge count={heartCount} />
              {weather && <div className="weather-chip">{
                weather.main==='Rain'?'🌧':weather.main==='Snow'?'❄️':weather.main==='Clear'?'☀️':weather.main==='Clouds'?'☁️':'🌤'
              }</div>}
            </div>

            <div className="screen" style={{ background:theme.bg }}>
              <div className="clock-bar">
                <span style={{ fontSize:'17px' }}>· 뱀뱀이 ·</span>
                <span className="clock-time">{formatTime(now)}</span>
                <span className="clock-mood">{theme.label}</span>
              </div>
              <div className="stage">
                {theme.showStars && <Stars />}
                <CityBackground opacity={theme.cityOpacity} showMoon={theme.showMoon} />
                <div className="message-area">
                  {userMessage && (
                    <div className="bubble-row right">
                      <div className="speech-bubble user" key={userMessage}>{userMessage}</div>
                    </div>
                  )}
                  {isThinking && (
                    <div className="bubble-row left">
                      <div className="speech-bubble bambami thinking-bubble"><span /><span /><span /></div>
                    </div>
                  )}
                  {bubbleVisible && !isThinking && (
                    <div className="bubble-row left">
                      <div className="speech-bubble bambami" key={bubble}>{bubble}</div>
                    </div>
                  )}
                </div>
                <div className="character-float">
                  <BambamiSVG expression={currentExpr} />
                </div>
              </div>
            </div>

            <div className="controls">
              {chatMode ? (
                <React.Fragment>
                  <div className="chat-input-area">
                    <input ref={inputRef} className="chat-input" type="text" value={inputText}
                      onChange={e=>setInputText(e.target.value)} onKeyDown={handleKeyDown}
                      placeholder="뱀뱀이에게 말 걸기..." maxLength={60} />
                    <button className="send-btn" onClick={handleSendMessage} disabled={!inputText.trim()}>전송</button>
                    <button className="cancel-btn" onClick={()=>{setChatMode(false);setInputText('');}} aria-label="취소">✕</button>
                  </div>
                  <div className="input-hint">Enter로 전송 · Esc로 취소</div>
                </React.Fragment>
              ) : (
                <div className="button-row">
                  <button className={`pixel-btn ${pressed==='talk'?'pressed':''}`}   onClick={handleTalk}>말걸기</button>
                  <button className={`pixel-btn ${pressed==='listen'?'pressed':''}`} onClick={handleListen}>듣기</button>
                  <button className="pixel-btn diary" onClick={()=>setShowDiary(true)}>📖</button>
                </div>
              )}
            </div>
            <div className="brand-label">⋆ BAMBAMI ⋆</div>
          </div>

          {showDiary && <DiaryModal nickname={nickname} onClose={()=>setShowDiary(false)} />}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<Bambami />);
  </script>
</body>
</html>
